---
minimum_pre_commit_version: 3.0.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: trailing-whitespace   # Trims trailing whitespace.
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending     # Replaces or checks mixed line ending.
        args: [--fix=lf]
      - id: end-of-file-fixer     # Makes sure files end in a newline and only a newline.
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: check-ast             # Simply check whether files parse as valid python.

  - repo: local
    hooks:
      - id: pin-github-actions
        name: Pin GitHub Actions to commit SHAs
        language: python
        entry: python .pre-commit-hooks/pin-github-actions.py
        files: ^\.github/workflows/.*\.ya?ml$

      - id: regen-doc-snippets
        name: Verify doc snippets are in sync
        entry: .pre-commit-hooks/regen-doc-snippets.py --check
        language: system
        pass_filenames: false
        # Fire on docs that include captured snippets and on the
        # Rust crates whose source determines clap's --help output
        # (binary main.rs, the project-init scaffold templates, and
        # the manifest/parser layer in toolr-core).
        files: ^(docs/|\.pre-commit-hooks/regen-doc-snippets\.py$|crates/toolr/src/.*\.rs$|crates/toolr/src/init_templates/|crates/toolr-core/src/.*\.rs$)

      - id: build-skill-refs
        name: Regenerate skills/*/references/*.md
        # Auto-fix style: the hook *regenerates* the references
        # files rather than running `--check`. If the generator
        # produces different bytes than what's on disk, prek sees
        # the modification and fails the commit; the user re-stages
        # the now-fresh references and commits again. This mirrors
        # how `ruff format` and `trim trailing whitespace` already
        # work in this config — drift gets fixed locally instead of
        # bouncing the commit with a confusing diff.
        #
        # The actual drift gate lives in CI (`_test.yml` runs
        # `cargo xtask build-skill-refs --check`) — even contributors
        # who skip prek hooks can't land regenerator drift.
        entry: cargo xtask build-skill-refs
        language: system
        pass_filenames: false
        # Fire on sources that drive any generated skill reference:
        # the xtask crate itself, the toolr-py public surface the
        # authoring generator walks, the toolr-core docstrings table
        # and manifest models the packaging generator embeds, and the
        # committed references themselves (so hand-edits are caught).
        files: ^(crates/xtask/.*\.rs$|crates/toolr-py/python/toolr/.*\.py$|crates/toolr-core/src/docstrings\.rs$|crates/toolr-core/src/manifest/model\.rs$|crates/toolr-core/src/third_party/(model|glob)\.rs$|skills/.*/references/.*\.md$)

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        # shellcheck only understands sh/bash. The zsh and fish
        # completion scripts under src/complete/scripts/ use shell-specific
        # syntax that shellcheck cannot parse.
        exclude: '\.(zsh|fish)$'

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.15
    hooks:
      - id: uv-lock

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.15.13"
    hooks:
      - id: ruff-format
      - id: ruff-check
        alias: ruff
        args:
          - --fix
        exclude: .pre-commit-hooks/.*\.py

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        name: Run mypy against the code base
        files: ^(python/|tests/).*\.py$
        exclude: ^tests/support/coverage/.*\.py$
        args: []
        additional_dependencies:
          - attrs
          - hypothesis
          - msgspec
          - pytest
          - rich
          - rich-argparse

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words=.codespell.words.ignore
        additional_dependencies:
          - tomli

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.94
    hooks:
      - id: rumdl
        # Config picked up from .rumdl.toml.

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # Does it compile?
      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false
