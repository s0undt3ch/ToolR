---
minimum_pre_commit_version: 3.0.0
# Install both the pre-commit and commit-msg git hooks on `prek install`
# (existing clones must re-run `prek install --install-hooks` once to pick up
# the commit-msg hook). `default_stages` pins every hook to the pre-commit
# stage unless it opts in otherwise — without it, `pass_filenames: false` hooks
# (cargo check, clippy, …) would run a second time at the commit-msg stage.
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: trailing-whitespace   # Trims trailing whitespace.
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending     # Replaces or checks mixed line ending.
        args: [--fix=lf]
      - id: end-of-file-fixer     # Makes sure files end in a newline and only a newline.
      - id: check-ast             # Simply check whether files parse as valid python.

  - repo: https://github.com/s0undt3ch/pre-commit-hooks
    rev: v1.0.0
    hooks:
      # One pass: pin any unpinned `uses:` ref to a SHA AND verify that
      # every already-pinned ref still matches the SHA its `# <tag>` comment
      # resolves to (catching hand-edited / typosquatted / upstream-repointed
      # pins). Fires on everything that carries pins — workflows, composite
      # actions, and the root action.yml. Resolutions are memoised per run.
      # Requires `gh`; a missing gh is a hard error here (pass `--exit-zero`
      # for a non-blocking, gh-optional advisory run).
      - id: pin-github-actions

      - id: actionlint
      - id: shellcheck

      - id: gitleaks

      - id: ruff-format
      - id: ruff-check
        alias: ruff
        args:
          - --fix
        exclude: .pre-commit-hooks/.*\.py

      - id: typos

      # Spell-check the commit message too — git-cliff builds the CHANGELOG
      # from commit subjects, so a typo here propagates into the release
      # notes. Runs check-only via the generic `system-tool` wrapper (no
      # `--write-changes`, so the message is never silently rewritten).
      - id: system-tool
        alias: typos-commit-msg
        name: typos (commit message)
        args: [typos]
        stages: [commit-msg]

      - id: rumdl
        # Config picked up from .rumdl.toml.

      - id: mypy
        name: Run mypy against the code base
        files: ^(python/|tests/).*\.py$
        exclude: ^tests/support/coverage/.*\.py$

      - id: uv-lock
        alias: uv-lock-project
        name: Lock project dependencies
        files: ^(uv\.lock|pyproject\.toml)$

      - id: uv-lock
        alias: uv-lock-tools
        name: Lock tools dependencies
        args:
          - --project=tools
        files: ^tools/(uv\.lock|pyproject\.toml)$

  - repo: local
    hooks:
      - id: regen-doc-snippets
        name: Verify doc snippets are in sync
        entry: .pre-commit-hooks/regen-doc-snippets.py --check
        language: system
        pass_filenames: false
        # Fire on docs that include captured snippets and on the
        # Rust crates whose source determines clap's --help output
        # (binary main.rs, the project-init scaffold templates, and
        # the manifest/parser layer in toolr-core).
        files: >
          (?x)^(
            docs/.*|
            \.pre-commit-hooks/regen-doc-snippets\.py$|
            crates/toolr/src/.*\.rs$|
            crates/toolr/src/init_templates/.*|
            crates/toolr-core/src/.*\.rs$
          )$

      - id: build-skill-refs
        name: Regenerate skills/*/references/*.md
        # Auto-fix style: the hook *regenerates* the references
        # files rather than running `--check`. If the generator
        # produces different bytes than what's on disk, prek sees
        # the modification and fails the commit; the user re-stages
        # the now-fresh references and commits again. This mirrors
        # how `ruff format` and `trim trailing whitespace` already
        # work in this config — drift gets fixed locally instead of
        # bouncing the commit with a confusing diff.
        #
        # The actual drift gate lives in CI (`_test.yml` runs
        # `cargo xtask build-skill-refs --check`) — even contributors
        # who skip prek hooks can't land regenerator drift.
        entry: cargo xtask build-skill-refs
        language: system
        pass_filenames: false
        # Fire on sources that drive any generated skill reference:
        # the xtask crate itself, the toolr-py public surface the
        # authoring generator walks, the toolr-core docstrings table
        # and manifest models the packaging generator embeds, the
        # root `action.yml` that drives the toolr-ci-setup reference,
        # and the committed references themselves (so hand-edits are
        # caught).
        files: >
          (?x)^(
            crates/xtask/.*\.rs|
            crates/toolr-py/python/toolr/.*\.py|
            crates/toolr-core/src/docstrings\.rs|
            crates/toolr-core/src/manifest/model\.rs|
            crates/toolr-core/src/third_party/(model|glob)\.rs|
            action\.yml|
            skills/.*/references/.*\.md
          )$

  - repo: local
    hooks:
      # Auto-fix style (mirrors `build-skill-refs`): `cargo fetch`
      # resolves the dependency graph and minimally rewrites
      # `Cargo.lock` to match `Cargo.toml` without gratuitously
      # bumping unrelated transitives the way `cargo update` would.
      # If the rewrite changes bytes on disk, prek sees the
      # modification and fails the commit; re-stage the fresh
      # lockfile and commit again. No compilation — the heavier
      # `cargo check` hooks below pick that up on `.rs` changes.
      - id: cargo-lock
        name: Sync Cargo.lock with Cargo.toml
        entry: cargo fetch
        language: system
        pass_filenames: false
        files: ^(Cargo\.toml|Cargo\.lock|crates/[^/]+/Cargo\.toml)$

      # Does it compile?
      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false
