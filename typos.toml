# Typo-checker configuration.
#
# Commit SHAs collide with typos' dictionary (e.g. `e979ba0` -> `ba` ->
# `by`/`be`). Rather than skipping whole generated files, ignore the
# SHA-shaped hex structurally so real typos in those files are still caught.
# (Commit *messages* — what git-cliff builds the CHANGELOG from — are
# spell-checked at the source by the commit-msg typos hook.)
[default]
extend-ignore-re = [
    # dev version git-describe suffix, e.g. `0.25.3-dev2+g8b1a8ba`
    # (action.yml default and the generated skill references).
    '\+g[0-9a-f]+',
    # full 40-char SHAs: git revert / cherry-pick boilerplate in commit
    # messages, and the `/commit/<sha>` URLs in the git-cliff CHANGELOG.
    '\b[0-9a-f]{40}\b',
    # short SHAs the CHANGELOG renders in backticks, e.g. `91f45b8`.
    '`[0-9a-f]{7,40}`',
]
