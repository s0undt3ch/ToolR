site_name: ToolR Documentation
strict: true
theme:
  name: material
  logo: imgs/toolr.png
  icon: imgs/toolr.png
  favicon: imgs/toolr.png
  palette:
    primary: black
    accent: indigo
    scheme: slate

  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installation:
    - Overview: installation/index.md
    - mise: installation/mise.md
  - How toolr is laid out: concepts.md
  - Writing commands:
    - Overview: writing-commands/index.md
    - Groups & commands: writing-commands/groups.md
    - Arguments: writing-commands/arguments.md
    - Docstrings: writing-commands/docstrings.md
    - Using `ctx`: writing-commands/context.md
    - Annotations: writing-commands/annotations.md
    - Nested groups: writing-commands/nesting.md
    - Known bugs: writing-commands/known-bugs.md
  - Migration (legacy → string-path): migration.md
  - Project configuration: project-config.md
  - CLI reference: cli.md
  - Third-party packages: third-party.md
  - Internals:
    - Overview: internals/index.md
    - Manifest layers: internals/manifest.md
    - Cache layout: internals/cache.md
    - Pre-commit integration: internals/pre-commit.md
    - Diagnostics: internals/diagnostics.md
  - API reference:
    - Overview: reference/index.md
    - Context: reference/context.md
    - command_group: reference/command_group.md
    - command: reference/command.md
    - arg: reference/arg.md
    - arg_section: reference/arg_section.md
    - testing: reference/testing.md
    - build: reference/build.md
  - Contributing: contributing.md
  - Changelog: changelog.md

# https://www.mkdocs.org/user-guide/configuration/#validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

plugins:
  - autorefs:
      resolve_closest: true
  - search
  - mkdocstrings:
      default_handler: python
      enable_inventory: true
      handlers:
        python:
          paths: [python]
          options:
            allow_inspection: true
            show_source: true
            find_stubs_package: true
            members_order: source
            separate_signature: true
            #filters: ["!^_"]
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://rich.readthedocs.io/en/stable/objects.inv

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      separator: "-"
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed
  - markdown_include.include:
      base_path: .

watch:
  - python
  - docs
