name: Setup UV
description: Install all repo tooling via mise (Python, uv, rust, prek, ...) and sync the project venv.

inputs:
  python-version:
    default: ""
    description: >-
      Python version to use. Overrides the version pinned in mise.toml via
      `MISE_PYTHON_VERSION`. Leave empty (the default) to inherit mise.toml's
      pin; pass a concrete version (e.g. `"3.11"`) from a matrix entry.

  cache-prefix:
    required: true
    description: "The prefix to use for the .venv cache key"

  cache-seed:
    default: "1"
    description: "Bumpable seed mixed into every cache key. Bump to invalidate all caches for this composite."

  uv-sync-args:
    default: "--all-extras --dev --no-install-workspace"
    description: "The arguments to pass to the uv sync command. e.g., `--group docs` or `--dev`"
  mise-version:
    required: true
    description: >-
      Version of mise to install via jdx/mise-action. Callers should pass the
      `MISE_VERSION` env var from the top-level workflow so every job uses the
      same pinned mise build (and shares the matching mise-install cache).

outputs:
  uv-version:
    description: "The version of uv installed"
    value: ${{ steps.uv-version-checksum.outputs.uv-version }}

  python-version-checksum:
    description: "The checksum of the Python version"
    value: ${{ steps.python-version-checksum.outputs.version-sha256sum }}

  uv-version-checksum:
    description: "The checksum of the UV version"
    value: ${{ steps.uv-version-checksum.outputs.version-sha256sum }}

runs:
  using: composite
  steps:
    # Export MISE_PYTHON_VERSION to $GITHUB_ENV BEFORE `Set up mise` runs.
    # That way the override applies not only to the mise-action step but
    # to every subsequent step in the job (uv sync, install python deps,
    # etc.). Without this, mise re-resolves to mise.toml's `python = ...`
    # pin in later steps and the venv ends up on the wrong CPython —
    # symptom seen on Windows test runs (matrix asked for 3.11, venv
    # ended up cp314 because that's what mise.toml pins).
    - name: Export MISE_PYTHON_VERSION
      if: inputs.python-version != ''
      shell: bash
      run: echo "MISE_PYTHON_VERSION=${{ inputs.python-version }}" >> "$GITHUB_ENV"

    # `jdx/mise-action` caches only mise's own data dir
    # (`~/.local/share/mise`), which records that `rust 1.96.0` is
    # installed — but the toolchain itself, including the `clippy` and
    # `rustfmt` components, lives in `~/.rustup` (the `core:rust` backend
    # installs via rustup and symlinks it; see `mise.toml`). `~/.rustup`
    # is outside mise's cached scope, so on a mise cache *hit* mise reports
    # "all tools are installed" and skips `rustup component add` — leaving
    # `~/.rustup` as whatever was restored, which need not contain clippy.
    # The pre-commit `clippy` hook then fails with `'cargo-clippy' is not
    # installed for the toolchain '1.96.0-...'`, and maturin's
    # `cargo metadata` fails the same way for the `cargo` component.
    #
    # Caching `~/.rustup` (below) keeps a warm toolchain around, but is a
    # *speed optimisation only* — it cannot guarantee correctness on its own:
    # this cache and mise's data-dir cache have independent keys and are saved
    # by different jobs at different times, so a job with a mise-cache hit but
    # a `~/.rustup`-cache miss skips the install and then saves a
    # clippy-less `~/.rustup` under the shared key, poisoning it for everyone.
    # The "Ensure rust components" step after mise is what actually guarantees
    # the components exist, regardless of what either cache restored.
    #
    # Exact-match key only (no `restore-keys`): keyed on the `mise.toml`/
    # `mise.lock` hash so it invalidates on any toolchain change. Shared across
    # job types (no `cache-prefix`) — the toolchain is identical everywhere.
    - name: Cache rust toolchain (~/.rustup)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.rustup
        key: rustup|${{ inputs.cache-seed }}|${{ inputs.mise-version }}|${{ runner.os }}|${{ runner.arch }}|${{ hashFiles('mise.toml', 'mise.lock') }}

    - name: Set up mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      env:
        # Belt-and-braces: also pass via the step `env:` so the override
        # takes effect even when the previous step is skipped (empty
        # `python-version` input).
        MISE_PYTHON_VERSION: ${{ inputs.python-version }}
      with:
        version: ${{ inputs.mise-version }}
        cache: true
        cache_key_prefix: mise|${{ inputs.cache-seed }}|${{ inputs.mise-version }}|${{ runner.os }}|${{ runner.arch }}|${{ inputs.cache-prefix }}

    # Deterministic guarantee that `clippy`/`rustfmt` are present on the
    # mise-pinned toolchain. mise declares these `components` in `mise.toml`,
    # but only installs them when it actually installs the toolchain — on a
    # mise-cache hit it short-circuits ("all tools are installed") and a
    # restored/poisoned `~/.rustup` may lack them. `rustup component add` is
    # idempotent: a no-op (~instant) when present, a quick fetch when not. It
    # targets the active toolchain (mise exports `RUSTUP_TOOLCHAIN`), so it
    # follows the `mise.toml` pin automatically with no version hardcoded here.
    - name: Ensure rust components (clippy, rustfmt)
      shell: bash
      run: rustup component add clippy rustfmt

    - name: Get Python version checksum
      id: python-version-checksum
      shell: bash
      run: |
        VERSION_SHA256SUM=$(python --version --version | sha256sum | cut -d ' ' -f 1)
        echo "VERSION_SHA256SUM=$VERSION_SHA256SUM"
        echo "version-sha256sum=$VERSION_SHA256SUM" >> "$GITHUB_OUTPUT"

    - name: Get UV version checksum
      id: uv-version-checksum
      shell: bash
      run: |
        UV_VERSION=$(uv --version | awk '{print $2}')
        VERSION_SHA256SUM=$(uv --version | sha256sum | cut -d ' ' -f 1)
        echo "UV_VERSION=$UV_VERSION"
        echo "VERSION_SHA256SUM=$VERSION_SHA256SUM"
        echo "uv-version=$UV_VERSION" >> "$GITHUB_OUTPUT"
        echo "version-sha256sum=$VERSION_SHA256SUM" >> "$GITHUB_OUTPUT"

    - name: Set up cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .venv
        key: venv|${{ inputs.cache-seed }}|${{ inputs.mise-version }}|${{ runner.os }}|${{ inputs.cache-prefix }}|${{ steps.python-version-checksum.outputs.version-sha256sum }}|${{ steps.uv-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}

    - name: Install Python Dependencies
      shell: bash
      run: |
        uv sync ${{ inputs.uv-sync-args }}
