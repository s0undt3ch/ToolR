name: setup-pre-commit
description: Install prek (and its Rust/uv/Python prerequisites) via mise, then prime the prek hook cache.

inputs:
  cache-seed:
    description: Cache seed to use for prek
    required: true
    default: prek-action
  python-version:
    description: >-
      Optional override for the Python version mise installs. Defaults to the pin in mise.toml.
    required: false
    default: ""
  mise-version:
    description: >-
      Version of mise to install via jdx/mise-action. Callers should pass the
      `MISE_VERSION` env var from the top-level workflow so every job uses the
      same pinned mise build (and shares the matching mise-install cache).
    required: true

outputs:
  prek-version:
    description: Prek version installed
    value: ${{ steps.prek-version.outputs.prek-version }}
  prek-home:
    description: Prek home directory
    value: ${{ steps.setup-prek-home.outputs.prek-home }}

runs:
  using: composite

  steps:

    - name: Set up mise
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      env:
        MISE_PYTHON_VERSION: ${{ inputs.python-version }}
      with:
        version: ${{ inputs.mise-version }}
        cache: true
        cache_key_prefix: mise|${{ inputs.cache-seed }}|${{ inputs.mise-version }}|${{ runner.os }}|${{ runner.arch }}|pre-commit

    # The `clippy` pre-commit hook runs `cargo clippy`, which needs the
    # `clippy` rustup component on the mise-pinned toolchain. mise declares it
    # in `mise.toml` but only installs components when it actually installs the
    # toolchain — on a mise-cache hit it short-circuits ("all tools are
    # installed") and `~/.rustup` (outside mise's cached scope) may lack it, so
    # the hook fails with `'cargo-clippy' is not installed`. `rustup component
    # add` is idempotent — instant when present, a quick fetch when not — and
    # targets the active (mise-exported `RUSTUP_TOOLCHAIN`) toolchain, so it
    # follows the pin with no version hardcoded. Mirrors the same guard in the
    # `setup-virtualenv` composite.
    - name: Ensure rust components (clippy, rustfmt)
      shell: bash
      run: rustup component add clippy rustfmt

    # The `mypy` prek hook (from s0undt3ch/pre-commit-hooks) runs mypy from the
    # project venv on PATH. mise seeds an empty venv, so install just the
    # `pre-commit` dependency group into it — `--only-group` skips the
    # default/dev groups and the Rust workspace build (all wheels, so it's
    # quick). Binary hook tools (ruff, typos, rumdl, gh, actionlint,
    # shellcheck, gitleaks) come from mise, installed by the step above.
    - name: Install pre-commit Python tools into the venv
      shell: bash
      run: uv sync --only-group pre-commit

    - name: Get prek version
      id: prek-version
      shell: bash
      run: |
        PREK_VERSION=$(prek --version | awk '{print $2}')
        echo "PREK_VERSION=$PREK_VERSION"
        echo "prek-version=$PREK_VERSION" >> "$GITHUB_OUTPUT"

    - name: Get Python version checksum
      id: python-version-checksum
      shell: bash
      run: |
        VERSION_SHA256SUM=$(python --version --version | sha256sum | cut -d ' ' -f 1)
        echo "VERSION_SHA256SUM=$VERSION_SHA256SUM"
        echo "version-sha256sum=$VERSION_SHA256SUM" >> "$GITHUB_OUTPUT"
        echo "python-path=$(which python)" >> "$GITHUB_OUTPUT"

    - name: Setup prek home
      shell: bash
      id: setup-prek-home
      run: |
        PREK_HOME=${{ github.workspace }}/.cache/prek
        echo "prek-home=${PREK_HOME}" >> "$GITHUB_OUTPUT"
        echo "PREK_HOME=${PREK_HOME}" >> "$GITHUB_ENV"
        echo "PREK_COLOR=always" >> "$GITHUB_ENV"

    - name: Cache MyPy & Ruff Caches
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: |
          ${{ github.workspace }}/.mypy_cache
          ${{ github.workspace }}/.ruff_cache
        key: |-
          mypy-ruff-cache|${{ inputs.cache-seed }}|${{ runner.os }}|${{ runner.arch }}|${{
            steps.prek-version.outputs.prek-version }}|${{
            steps.python-version-checksum.outputs.version-sha256sum }}|${{
            hashFiles('pyproject.toml') }}|${{
            hashFiles(format('{0}/**/.pre-commit-config.yaml', github.workspace))
          }}

    - name: Set up prek hooks cache
      id: cache-prek-hooks
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: ${{ steps.setup-prek-home.outputs.prek-home }}
        key: |-
          prek-home|${{ inputs.cache-seed }}|${{ runner.os }}|${{ runner.arch }}|${{
            steps.prek-version.outputs.prek-version }}|${{
            steps.python-version-checksum.outputs.version-sha256sum }}|${{
            hashFiles(format('{0}/**/.pre-commit-config.yaml', github.workspace))
          }}

    - name: Install prek hooks
      shell: bash
      if: ${{ steps.cache-prek-hooks.outputs.cache-hit != 'true' }}
      run: |
        prek install --install-hooks
