name: Apply Release Patch
description: Prepare a release of ToolR

inputs:
  release-patch-name:
    required: true
    description: 'Release patch to apply'


runs:
  using: composite

  steps:

    - name: Download Release Patch Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.release-patch-name }}

    - name: Apply The Release Patch
      shell: bash
      env:
        RELEASE_PATCH_NAME: ${{ inputs.release-patch-name }}
      run: |
        git am --committer-date-is-author-date "$RELEASE_PATCH_NAME"
