name: Build Binary Archive

on:
  workflow_call:
    inputs:
      release-version:
        required: true
        type: string
        description: 'Release version (e.g. 1.0.0)'
      release-tarball-name:
        required: true
        type: string
        description: 'Name of the source tarball artifact to download'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'
      mise-version:
        required: true
        type: string
        description: 'Version of mise to install. Pass the caller workflow''s MISE_VERSION env var.'
      targets:
        required: true
        type: string
        description: 'JSON-encoded array of {triple, runner, cross, archive} objects describing which standalone binaries to build. Produced by `toolr ci generate-build-matrix --workflow {ci,release}` so the matrix stays centralized in tools/ci.py.'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target.triple }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        # Each entry: {triple, runner, cross, archive}. Native runners
        # cover x86_64/arm64 on Linux + macOS + Windows; `cross` is reserved
        # for the musl targets where GitHub does not provide a matching
        # native runner. See tools/ci.py:_BINARY_ARCHIVE_TRIPLES for the
        # canonical list.
        target: ${{ fromJson(inputs.targets) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Tarball Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.release-tarball-name }}
          path: src-tarball

      - name: Unpack source tarball
        run: |
          mkdir -p workdir
          tar -xzf src-tarball/*.tar.gz -C workdir --strip-components=1
          ls workdir

      - name: Set up mise (installs Rust toolchain pinned in mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ inputs.mise-version }}
          cache: true
          cache_key_prefix: ${{ inputs.cache-seed }}|mise|${{ inputs.mise-version }}|build-binary|${{ runner.os }}|${{ runner.arch }}|${{ matrix.target.triple }}

      # `cross` runs in a container with its own toolchain, so we only need
      # to add the matrix target for native builds.
      - name: Add Rust target
        if: ${{ !matrix.target.cross }}
        run: rustup target add ${{ matrix.target.triple }}

      - name: Install cross
        if: matrix.target.cross
        run: cargo install cross --locked --version "^0.2"

      # `--locked` is intentionally absent: `uv build --sdist --package toolr`
      # rewrites the sdist's workspace `Cargo.toml` to drop `crates/toolr-py`,
      # but does NOT prune the bundled `Cargo.lock`. Cargo's in-place prune
      # of the stale toolr-py-only entries during build is mechanical (no
      # dep-version drift); `--locked` would refuse and fail the build. The
      # sdist itself is the reproducibility artifact — its Cargo.lock is the
      # canonical lock.
      - name: Build binary (native)
        if: ${{ !matrix.target.cross }}
        working-directory: workdir
        run: cargo build --release -p toolr --bin toolr --target ${{ matrix.target.triple }}

      - name: Build binary (cross)
        if: matrix.target.cross
        working-directory: workdir
        run: cross build --release -p toolr --bin toolr --target ${{ matrix.target.triple }}

      - name: Stage archive contents
        working-directory: workdir
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          stage="stage/toolr-${VERSION}-${TRIPLE}"
          mkdir -p "${stage}"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            cp "target/${TRIPLE}/release/toolr.exe" "${stage}/"
          else
            cp "target/${TRIPLE}/release/toolr" "${stage}/"
          fi
          cp LICENSE "${stage}/LICENSE"
          cp README.md "${stage}/README.md"
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md "${stage}/CHANGELOG.md"
          fi

      - name: Create archive (tar.gz)
        if: matrix.target.archive == 'tar.gz'
        working-directory: workdir
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          base="toolr-${VERSION}-${TRIPLE}"
          mkdir -p dist
          tar -czvf "dist/${base}.tar.gz" -C stage "${base}"
          # macOS runners don't ship GNU coreutils — no `sha256sum`. The
          # BSD `shasum -a 256` produces identical "<hex>  <file>" output.
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist && sha256sum "${base}.tar.gz" > "${base}.tar.gz.sha256" )
          else
            ( cd dist && shasum -a 256 "${base}.tar.gz" > "${base}.tar.gz.sha256" )
          fi

      - name: Create archive (zip)
        if: matrix.target.archive == 'zip'
        working-directory: workdir
        shell: pwsh
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          $base = "toolr-$env:VERSION-$env:TRIPLE"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "stage/$base" -DestinationPath "dist/$base.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$base.zip").Hash.ToLower()
          Set-Content -Path "dist/$base.zip.sha256" -Value "$hash  $base.zip"

      # SLSA build provenance — always attested for archives that ship
      # to users. `gh attestation verify` (and any client speaking the
      # sigstore bundle format) can cryptographically prove the archive
      # was produced by this workflow against this exact commit.
      - name: Attest archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: workdir/dist/toolr-*.${{ matrix.target.archive }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: toolr-archive-${{ matrix.target.triple }}
          path: |
            workdir/dist/toolr-*.${{ matrix.target.archive }}
            workdir/dist/toolr-*.${{ matrix.target.archive }}.sha256
          if-no-files-found: error
