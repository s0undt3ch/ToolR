name: Build Binary Archive

on:
  workflow_call:
    inputs:
      release-version:
        required: true
        type: string
        description: 'Release version (e.g. 1.0.0)'
      release-tarball-name:
        required: true
        type: string
        description: 'Name of the source tarball artifact to download'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target.triple }}
    runs-on: ${{ matrix.target.runner }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          # Native runners cover x86_64/arm64 on Linux + macOS + Windows.
          # `cross` is reserved for the musl targets where GitHub does not
          # provide a matching native runner.
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            archive: tar.gz
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            cross: false
            archive: tar.gz
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
            archive: tar.gz
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            cross: true
            archive: tar.gz
          - triple: x86_64-apple-darwin
            runner: macos-13
            cross: false
            archive: tar.gz
          - triple: aarch64-apple-darwin
            runner: macos-14
            cross: false
            archive: tar.gz
          - triple: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            archive: zip

    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Tarball Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.release-tarball-name }}
          path: src-tarball

      - name: Unpack source tarball
        run: |
          mkdir -p workdir
          tar -xzf src-tarball/*.tar.gz -C workdir --strip-components=1
          ls workdir

      - name: Set up mise (installs Rust toolchain pinned in mise.toml)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          cache_key_prefix: ${{ inputs.cache-seed }}|mise|build-binary|${{ runner.os }}|${{ runner.arch }}|${{ matrix.target.triple }}

      # `cross` runs in a container with its own toolchain, so we only need
      # to add the matrix target for native builds.
      - name: Add Rust target
        if: ${{ !matrix.target.cross }}
        run: rustup target add ${{ matrix.target.triple }}

      - name: Install cross
        if: matrix.target.cross
        run: cargo install cross --locked --version "^0.2"

      - name: Build binary (native)
        if: ${{ !matrix.target.cross }}
        working-directory: workdir
        run: cargo build --release --locked -p toolr --bin toolr --target ${{ matrix.target.triple }}

      - name: Build binary (cross)
        if: matrix.target.cross
        working-directory: workdir
        run: cross build --release --locked -p toolr --bin toolr --target ${{ matrix.target.triple }}

      - name: Stage archive contents
        working-directory: workdir
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          stage="stage/toolr-${VERSION}-${TRIPLE}"
          mkdir -p "${stage}"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            cp "target/${TRIPLE}/release/toolr.exe" "${stage}/"
          else
            cp "target/${TRIPLE}/release/toolr" "${stage}/"
          fi
          cp LICENSE "${stage}/LICENSE"
          cp README.md "${stage}/README.md"
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md "${stage}/CHANGELOG.md"
          fi

      - name: Create archive (tar.gz)
        if: matrix.target.archive == 'tar.gz'
        working-directory: workdir
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          base="toolr-${VERSION}-${TRIPLE}"
          mkdir -p dist
          tar -czvf "dist/${base}.tar.gz" -C stage "${base}"
          ( cd dist && sha256sum "${base}.tar.gz" > "${base}.tar.gz.sha256" )

      - name: Create archive (zip)
        if: matrix.target.archive == 'zip'
        working-directory: workdir
        shell: pwsh
        env:
          TRIPLE: ${{ matrix.target.triple }}
          VERSION: ${{ inputs.release-version }}
        run: |
          $base = "toolr-$env:VERSION-$env:TRIPLE"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "stage/$base" -DestinationPath "dist/$base.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$base.zip").Hash.ToLower()
          Set-Content -Path "dist/$base.zip.sha256" -Value "$hash  $base.zip"

      # SLSA build provenance — always attested for archives that ship
      # to users. `gh attestation verify` (and any client speaking the
      # sigstore bundle format) can cryptographically prove the archive
      # was produced by this workflow against this exact commit.
      - name: Attest archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: workdir/dist/toolr-*.${{ matrix.target.archive }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: toolr-archive-${{ matrix.target.triple }}
          path: |
            workdir/dist/toolr-*.${{ matrix.target.archive }}
            workdir/dist/toolr-*.${{ matrix.target.archive }}.sha256
          if-no-files-found: error
