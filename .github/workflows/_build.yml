name: Build

on:
  workflow_call:
    inputs:
      display-name:
        required: true
        type: string
        description: 'Display name for the build job'
      release-tarball-name:
        required: true
        type: string
        description: 'Release tarball name'
      platform-matrix:
        required: true
        type: string
        description: 'Platform matrix as JSON string'

permissions:
  contents: read

jobs:
  build:
    name: ${{ inputs.display-name }} (${{ matrix.python }}, ${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platform-matrix) }}
        python:
          - "cp311"
          - "cp312"
          - "cp313"

    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Tarball Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.release-tarball-name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        if: ${{ matrix.platform.emulation }}
        with:
          platforms: all

      - name: Cache cibuildwheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cibw|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|${{ matrix.python }}|${{ hashFiles('Cargo.lock', 'pyproject.toml') }}
          restore-keys: |
            cibw|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|${{ matrix.python }}|
            cibw|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_ARCHS_LINUX: all
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform.name }}
          # Enable verbose output to see caching in action
          CIBW_BUILD_VERBOSITY: 1
          # Pass Cargo cache to the container
          CIBW_ENVIRONMENT_LINUX: CARGO_HOME=/host$HOME/.cargo
        with:
          package-dir: ${{ inputs.release-tarball-name }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        # Only run attestations on the main repository, not on forks
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          subject-path: wheelhouse/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheel-${{ matrix.python }}-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
