name: Build

on:
  workflow_call:
    inputs:
      display-name:
        required: true
        type: string
        description: 'Display name for the build job'
      release-tarball-name:
        required: true
        type: string
        description: 'Release tarball name'
      platform-matrix:
        required: true
        type: string
        description: 'Platform matrix as JSON string'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'
      wheel-kind:
        required: true
        type: string
        description: 'Label distinguishing the wheel build. Use "binary" for the toolr (bin) wheel and "py" for the toolr-py (pyo3) wheel. Embedded in the uploaded artifact name to avoid collisions between the two builds for identical python x platform combinations.'
      pythons:
        required: true
        type: string
        description: 'JSON-encoded array of cibuildwheel Python ABI tags to build (e.g. ''["cp311","cp312","cp313","cp314"]''). Callers should mirror each crate''s `requires-python` / `[tool.cibuildwheel] build` line — binary wheels only need cp311 (py3-none-<plat>), py wheels need every supported CPython.'

permissions:
  contents: read

jobs:
  build:
    name: ${{ inputs.display-name }} (${{ matrix.python }}, ${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platform-matrix) }}
        python: ${{ fromJson(inputs.pythons) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: ./.github/actions/throttle

      - name: Download Source Tarball Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.release-tarball-name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        if: ${{ matrix.platform.emulation }}
        with:
          platforms: all

      - name: Cache cibuildwheel
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Exact-match key includes matrix.python so a cp311 build never
          # restores a cache populated by another CPython's run-state. The
          # restore-keys ladder narrows in two steps: (1) drop the
          # hashFiles segment to fall back to "any prior run of THIS
          # python+platform"; (2) drop matrix.python to fall back to a
          # sibling cp's cache. Step (2) is intentional: the cached
          # contents are `~/.cache/cibuildwheel` (mostly download metadata
          # and build-tool fetches that cibuildwheel sandboxes per-build
          # anyway) and `~/.cargo/registry|git` (Python-agnostic). No
          # per-CPython state survives a sibling-cp restore in a way that
          # affects the produced wheel.
          key: ${{ inputs.cache-seed }}|cibw|${{ inputs.wheel-kind }}|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|${{ matrix.python }}|${{ hashFiles('Cargo.lock', format('crates/toolr{0}/pyproject.toml', inputs.wheel-kind == 'py' && '-py' || '')) }}
          restore-keys: |
            ${{ inputs.cache-seed }}|cibw|${{ inputs.wheel-kind }}|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|${{ matrix.python }}|
            ${{ inputs.cache-seed }}|cibw|${{ inputs.wheel-kind }}|${{ runner.os }}|${{ runner.arch }}|${{ matrix.platform.name }}|

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_ARCHS_LINUX: all
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform.name }}
          # Enable verbose output to see caching in action
          CIBW_BUILD_VERBOSITY: 1
          # Pass Cargo cache to the container
          CIBW_ENVIRONMENT_LINUX: CARGO_HOME=/host$HOME/.cargo
        with:
          # Each cibuildwheel job downloads its own per-crate sdist
          # tarball (binary vs pyo3) into $GITHUB_WORKSPACE; cibuildwheel
          # accepts a .tar.gz path here and auto-unpacks it, then builds
          # using the crate's own `pyproject.toml` at the sdist root
          # (which carries both `[project]` and `[tool.cibuildwheel]`).
          # This is why we don't pass CIBW_CONFIG_FILE: the per-crate
          # sdist already has the right config baked in. The two builds
          # never share input files, so artifact-name collisions are
          # impossible by construction.
          package-dir: ${{ inputs.release-tarball-name }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        # Attest everywhere except fork PRs (which lack `id-token`). The
        # bare `head.repo.full_name == github.repository` check was FALSE
        # on release (`workflow_dispatch`) and push-to-main — there's no
        # pull_request context, so `'' == 's0undt3ch/ToolR'` silently
        # skipped the per-wheel attestation (Test PyPI wheels from main
        # got none). `|| event_name != 'pull_request'` attests on release
        # + main pushes while still skipping only fork PRs. Matches
        # `_prepare-release.yml`. SEC-11.
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        with:
          subject-path: wheelhouse/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # `wheel-kind` must be embedded here: actions/upload-artifact@v4+
          # rejects duplicate artifact names within a workflow run, and
          # both the binary-wheel and pyo3-wheel matrices iterate over
          # the same python x platform combinations.
          name: cibw-wheel-${{ inputs.wheel-kind }}-${{ matrix.python }}-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
