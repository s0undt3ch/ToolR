name: Test Distribution

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'Operating system to run tests on'
      display-name:
        required: true
        type: string
        description: 'Display name for the test job'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'
      artifact-pattern:
        required: true
        type: string
        description: 'Pattern for artifact names to download andtest'
      mise-version:
        required: true
        type: string
        description: 'Version of mise to install (forwarded to the setup-virtualenv composite). Pass the caller workflow''s MISE_VERSION env var.'

permissions:
  contents: read

jobs:
  test:
    name: ${{ inputs.display-name }}
    runs-on: ${{ inputs.os }}
    permissions:
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: test-dist
          cache-seed: ${{ inputs.cache-seed }}
          mise-version: ${{ inputs.mise-version }}

      - name: Download platform wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ inputs.artifact-pattern }}
          path: wheelhouse/
          merge-multiple: true

      # Universal pure-Python wheel — built once upstream by
      # `build-example-plugin-wheel`. Picked up by the
      # `example_plugin_wheel` session fixture in
      # `tests/distribution/conftest.py`; missing artifact triggers an
      # inline `uv build` fallback inside the fixture.
      - name: Download example-plugin wheel (optional)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: example-plugin-wheel
          path: wheelhouse/

      - name: List downloaded wheels
        shell: bash
        run: ls -la wheelhouse/

      - name: Run Distribution Tests
        env:
          PYTHONPATH: "${{ github.workspace }}/tests/support/coverage"
          COVERAGE_PROCESS_START: "${{ github.workspace }}${{ runner.os == 'Windows' && '\\' || '/' }}.coveragerc"
        run: |
          uv run coverage run -m pytest -ra -s -v --color=yes --junitxml=junit-dist-${{ inputs.os }}.xml tests/distribution/

      - name: Report Python Coverage
        run: |
          uv run coverage combine || true
          uv run coverage xml
          uv run coverage report

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          flags: ${{ inputs.os }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        # codecov/test-results-action is deprecated in favour of running
        # codecov-action a second time with report_type: test_results.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          report_type: test_results
          files: junit-dist-${{ inputs.os }}.xml
          flags: ${{ inputs.os }}
