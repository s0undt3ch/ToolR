name: Sync Rolling Tags
run-name: "Sync Rolling Tags (branch: ${{ github.ref_name }})"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  # Bump to invalidate every cache used by this workflow.
  CACHE_SEED: "1"
  # `MISE_VERSION` lives in `.github/env` (loaded per-job).

jobs:
  update-rolling-tags:
    name: Update Rolling Tags
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check For Admin Permission
        uses: actions-cool/check-user-permission@c21884f3dda18dafc2f8b402fe807ccc9ec1aa5e # v2.4.0
        with:
          require: admin
          username: ${{ github.triggering_actor }}

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        shell: bash
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Load shared env vars
        shell: bash
        # See ci.yml's matching step for why we sed-filter instead of cat.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          cache_key_prefix: ${{ env.CACHE_SEED }}|mise|${{ env.MISE_VERSION }}|sync-rolling-tags|${{ runner.os }}|${{ runner.arch }}

      - name: Setup ToolR
        # In-repo composite action: downloads the toolr binary from a
        # GitHub release, verifies the SLSA build provenance, and
        # caches the in-tree `tools/.venv` for the rolling-tag sync
        # script.
        id: setup-toolr
        uses: ./
        with:
          version: latest
          cache-prefix: ${{ env.CACHE_SEED }}|setup-toolr|sync-rolling-tags

      - name: Setup Prek
        id: setup-pre-commit
        uses: ./.github/actions/setup-pre-commit
        with:
          cache-seed: ${{ env.CACHE_SEED }}|sync-rolling-tags
          mise-version: ${{ env.MISE_VERSION }}

      - name: Update rolling tags
        id: update-rolling-tags
        run: |
          toolr ci sync-rolling-tags

      - name: Fix any issues with pre-commit
        if: fromJSON(steps.update-rolling-tags.outputs.uncommitted-changes)
        run: |
          prek run --all-files --show-diff-on-failure || true

      - name: Show changes
        if: fromJSON(steps.update-rolling-tags.outputs.uncommitted-changes)
        run: |
          git diff --color

      - name: Commit the changes
        if: fromJSON(steps.update-rolling-tags.outputs.uncommitted-changes)
        run: |
          git commit -am "chore(release): Update ToolR action versions in workflows"

      - name: Push the changes
        if: fromJSON(steps.update-rolling-tags.outputs.uncommitted-changes)
        run: |
          git push
