name: Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'Operating system to run tests on'
      display-name:
        required: true
        type: string
        description: 'Display name for the test job'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'
      mise-version:
        required: true
        type: string
        description: 'Version of mise to install (forwarded to the setup-virtualenv composite). Pass the caller workflow''s MISE_VERSION env var.'
      pythons:
        required: true
        type: string
        description: 'JSON-encoded array of dotted CPython versions to test against (e.g. ''["3.11","3.12","3.13","3.14"]''). Produced by `toolr ci generate-build-matrix` (`test-pythons` output) so the test matrix stays in lockstep with the wheel-build matrix.'

permissions:
  contents: read

jobs:
  test:
    name: ${{ inputs.display-name }} (${{ matrix.python-version }})
    runs-on: ${{ inputs.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.pythons) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Derive the artifact identifiers we'll download below from the
      # matrix entry + the runner OS. Centralised here so the rest of the
      # job can reference `steps.artifacts.outputs.*` instead of repeating
      # the same `case $RUNNER_OS` everywhere.
      - name: Compute artifact identifiers
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)   triple=x86_64-unknown-linux-gnu;  wheelplat=manylinux_x86_64 ;;
            macOS)   triple=aarch64-apple-darwin;     wheelplat=macosx_arm64 ;;
            Windows) triple=x86_64-pc-windows-msvc;   wheelplat=win_amd64 ;;
            *) echo "unknown RUNNER_OS=$RUNNER_OS" >&2; exit 1 ;;
          esac
          # 3.11 -> cp311 (drop the dot)
          pyver="${{ matrix.python-version }}"
          cptag="cp${pyver//./}"
          {
            echo "toolr-triple=$triple"
            echo "wheel-platform=$wheelplat"
            echo "cp-tag=$cptag"
          } >> "$GITHUB_OUTPUT"

      # `--no-install-package toolr-py` is the key change: uv still sets
      # up dev/all-extras deps and installs the OTHER workspace members
      # (tools, examples/plugin-package), but skips toolr-py. We then
      # pip-install the prebuilt wheel matching this matrix entry â€” same
      # binary CI uploads to PyPI, no per-matrix maturin recompile.
      - uses: ./.github/actions/setup-virtualenv
        id: setup-virtualenv
        with:
          # Bumped from `test` to invalidate caches that still hold a
          # source-built (editable) toolr-py.
          cache-prefix: test-prebuilt-toolr-py
          cache-seed: ${{ inputs.cache-seed }}
          python-version: ${{ matrix.python-version }}
          uv-sync-args: "--no-install-package toolr-py --all-extras --dev"
          mise-version: ${{ inputs.mise-version }}

      - name: Download toolr-py wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cibw-wheel-py-${{ steps.artifacts.outputs.cp-tag }}-${{ steps.artifacts.outputs.wheel-platform }}
          path: ${{ runner.temp }}/toolr-py-wheel

      - name: Install toolr-py from prebuilt wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel=$(find "$RUNNER_TEMP/toolr-py-wheel" -maxdepth 1 -type f -name 'toolr_py-*.whl' -print -quit)
          if [ -z "$wheel" ]; then
            echo "no toolr_py wheel found under $RUNNER_TEMP/toolr-py-wheel/" >&2
            find "$RUNNER_TEMP/toolr-py-wheel" -maxdepth 2 -mindepth 1 -print >&2 || true
            exit 1
          fi
          # `--force-reinstall` overrides any leftover editable install
          # that may still be cached in .venv from older runs.
          uv pip install --force-reinstall "$wheel"

      - name: Download toolr binary archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolr-archive-${{ steps.artifacts.outputs.toolr-triple }}
          path: ${{ runner.temp }}/toolr-archive

      # Extract the standalone `toolr` binary from the archive and put it
      # on PATH. tests/conftest.py's `toolr_bin` fixture (and any future
      # subprocess-test) picks it up via `shutil.which("toolr")`.
      - name: Extract toolr binary onto PATH
        shell: bash
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/toolr-bin"
          mkdir -p "$dest"
          archive=$(find "$RUNNER_TEMP/toolr-archive" -maxdepth 1 -type f \( -name 'toolr-*.tar.gz' -o -name 'toolr-*.zip' \) -print -quit)
          if [ -z "$archive" ]; then
            echo "no toolr archive found under $RUNNER_TEMP/toolr-archive/" >&2
            find "$RUNNER_TEMP/toolr-archive" -maxdepth 2 -mindepth 1 -print >&2 || true
            exit 1
          fi
          case "$archive" in
            *.tar.gz)
              tar -xzf "$archive" -C "$dest" --strip-components=1
              ;;
            *.zip)
              unzip -q "$archive" -d "$dest"
              # `Compress-Archive` retains the top-level dir; flatten so
              # `toolr.exe` lands directly in $dest.
              inner=$(find "$dest" -maxdepth 1 -mindepth 1 -type d | head -n1)
              if [ -n "$inner" ]; then
                mv "$inner"/* "$dest"/
                rmdir "$inner"
              fi
              ;;
          esac
          chmod +x "$dest"/toolr* 2>/dev/null || true
          echo "$dest" >> "$GITHUB_PATH"

      - id: rust-version-checksum
        shell: bash
        run: echo "version-sha256sum=$(rustc --version | sha256sum | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache `~/.cargo`
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ inputs.cache-seed }}|${{ runner.os }}|cargo|${{ steps.setup-virtualenv.outputs.python-version-checksum }}|${{ steps.rust-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - name: Cache Rust `target/coverage`
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/coverage
          key: ${{ inputs.cache-seed }}|${{ runner.os }}|target|coverage|${{ steps.setup-virtualenv.outputs.python-version-checksum }}|${{ steps.rust-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - name: Verify example-plugin manifest is in sync
        # Build-time invariant: the canonical example plugin's shipped
        # `toolr-manifest.json` must match what `toolr self build-manifest`
        # would regenerate from its current Python source. Drift here means
        # the plugin-packaging contract advertised in `docs/third-party.md`
        # would mislead authors who follow it. Lives here (rather than in
        # pre-commit) because the check requires the workspace toolr binary
        # to be built, which CI does anyway -- pre-commit would burn a
        # full Rust compile on every dev's first commit.
        shell: bash
        run: |
          cargo build --quiet -p toolr
          ./target/debug/toolr self build-manifest toolr_example_plugin --check

      - name: Run Python Tests
        env:
          PYTHONPATH: "${{ github.workspace }}/tests/support/coverage"
          COVERAGE_PROCESS_START: "${{ github.workspace }}${{ runner.os == 'Windows' && '\\' || '/' }}.coveragerc"
        run: |
          uv run coverage run -m pytest -ra -s -v --color=yes --junitxml=junit-${{ matrix.python-version }}-${{ inputs.os }}.xml

      - name: Report Python Coverage
        run: |
          uv run coverage combine || true
          uv run coverage xml
          uv run coverage report

      - name: Install cargo-llvm-cov
        # Replaces cargo-tarpaulin. tarpaulin's ptrace engine segfaulted
        # non-deterministically on nested subprocess trees (toolr â†’ sh â†’
        # python) used by cli_smoke and cache_fixtures (~50% repro on
        # Linux GHA; tarpaulin issues #461 / #790 / #317). cargo-llvm-cov
        # uses LLVM source-based coverage with LLVM_PROFILE_FILE=â€¦%p.profraw
        # so each spawned process writes a unique profraw and they're
        # merged at the end â€” subprocess coverage works without ptrace.
        #
        # `llvm-tools-preview` is required for the underlying llvm-profdata
        # / llvm-cov binaries. cargo-llvm-cov can install it on demand but
        # we add it explicitly so any failure surfaces here, not mid-run.
        shell: bash
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      # toolr-py is a pyo3 cdylib that imports Python symbols at runtime
      # via the loaded CPython host. `cargo test` builds a standalone test
      # binary that has no host, so the Python symbols (Py_TYPE,
      # PySequence_Check, etc.) are undefined at link time on Linux. The
      # pyo3 wrapper is exercised by Python-side tests via the cdylib;
      # excluding it from the Rust coverage run is the right call.
      - name: Run Rust Tests with Coverage
        # --tests             include both unit and `tests/*.rs` integration tests.
        # --cobertura         emit Cobertura XML (Codecov accepts it natively).
        # --output-path       deterministic file location for the upload step.
        # -- --test-threads=1 forwarded to libtest. Keeps the integration
        #                     suite serialised so flaky subprocess-spawn
        #                     timing doesn't surprise us; llvm-cov itself
        #                     has no concurrency limitation, this is purely
        #                     for test stability under tempdir-heavy specs.
        # Single-line invocation so the same step works under both bash
        # (Linux/macOS) and PowerShell (Windows runners use `pwsh` by
        # default, where bash's `\` line-continuation is a unary operator
        # and the line gets parsed as a separate command).
        shell: bash
        run: |
          mkdir -p target/coverage
          cargo llvm-cov --workspace --exclude toolr-py --tests --cobertura --output-path target/coverage/cobertura.xml -- --test-threads=1

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          flags: ${{ inputs.os }},${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        # codecov/test-results-action is deprecated in favour of running
        # codecov-action a second time with report_type: test_results.
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          report_type: test_results
          files: junit-${{ matrix.python-version }}-${{ inputs.os }}.xml
          flags: ${{ inputs.os }},${{ matrix.python-version }}
