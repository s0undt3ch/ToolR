name: Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'Operating system to run tests on'
      display-name:
        required: true
        type: string
        description: 'Display name for the test job'
      cache-seed:
        required: true
        type: string
        description: 'Seed mixed into every cache key. Bump in the caller workflow to invalidate.'
      mise-version:
        required: true
        type: string
        description: 'Version of mise to install (forwarded to the setup-virtualenv composite). Pass the caller workflow''s MISE_VERSION env var.'

permissions:
  contents: read

jobs:
  test:
    name: ${{ inputs.display-name }} (${{ matrix.python-version }})
    runs-on: ${{ inputs.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # setup-virtualenv runs jdx/mise-action under the hood, which installs
      # the Rust toolchain pinned in mise.toml alongside Python and uv.
      - uses: ./.github/actions/setup-virtualenv
        id: setup-virtualenv
        with:
          cache-prefix: test
          cache-seed: ${{ inputs.cache-seed }}
          python-version: ${{ matrix.python-version }}
          uv-sync-args: "--all-extras --dev"
          mise-version: ${{ inputs.mise-version }}

      - id: rust-version-checksum
        shell: bash
        run: echo "version-sha256sum=$(rustc --version | sha256sum | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache `~/.cargo`
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ inputs.cache-seed }}|${{ runner.os }}|cargo|${{ steps.setup-virtualenv.outputs.python-version-checksum }}|${{ steps.rust-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - name: Cache Rust `target/release`
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/release
          key: ${{ inputs.cache-seed }}|${{ runner.os }}|target|release|${{ steps.setup-virtualenv.outputs.python-version-checksum }}|${{ steps.rust-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - name: Cache Rust `target/coverage`
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/coverage
          key: ${{ inputs.cache-seed }}|${{ runner.os }}|target|coverage|${{ steps.setup-virtualenv.outputs.python-version-checksum }}|${{ steps.rust-version-checksum.outputs.version-sha256sum }}|${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - name: Build Rust Release
        run: |
          cargo build --release --target-dir target/release

      - name: Run Python Tests
        env:
          PYTHONPATH: "${{ github.workspace }}/tests/support/coverage"
          COVERAGE_PROCESS_START: "${{ github.workspace }}${{ runner.os == 'Windows' && '\\' || '/' }}.coveragerc"
        run: |
          uv run coverage run -m pytest -ra -s -v --color=yes --junitxml=junit-${{ matrix.python-version }}-${{ inputs.os }}.xml

      - name: Report Python Coverage
        run: |
          uv run coverage combine || true
          uv run coverage xml
          uv run coverage report

      - name: Install Tarpaulin
        run: |
          cargo install cargo-tarpaulin --target-dir target/coverage

      # toolr-py is a pyo3 cdylib that imports Python symbols at runtime
      # via the loaded CPython host. `cargo test`/`cargo tarpaulin` build a
      # standalone test binary that has no host, so the Python symbols
      # (Py_TYPE, PySequence_Check, etc.) are undefined at link time on
      # Linux. The pyo3 wrapper is exercised by Python-side tests via the
      # cdylib; excluding it here is the right call.
      - name: Tarpaulin Build
        run: |
          cargo tarpaulin --no-run --workspace --exclude toolr-py --target-dir target/coverage

      - name: Run Rust Tests
        run: |
          cargo tarpaulin --workspace --exclude toolr-py --tests --skip-clean --timeout 120 --out Xml --out Json --output-dir target/coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          flags: ${{ inputs.os }},${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          # Use OpenID Connect for secure authentication (no token needed)
          use_oidc: true
          flags: ${{ inputs.os }},${{ matrix.python-version }}
