name: CI Workflow
run-name: "CI (${{ github.event_name == 'pull_request' && format('pr: #{0}', github.event.number) || format('{0}: {1}', startsWith(github.event.ref, 'refs/tags') && 'tag' || 'branch', github.ref_name) }})"

on:
  push:
  pull_request:

concurrency:
  # Concurrency is defined in a way that concurrent builds against the main branch do not not cancel previous builds.
  # However, for branches other than the main branch, and every new build against the same pull request source branch,
  # all older builds against that same branch get canceled.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.repository }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ !contains(github.ref, 'refs/heads/main') }}

permissions: {}

env:
  COLUMNS: 190
  FORCE_COLOR: "1"
  TOOLR_DEBUG_IMPORTS: "1"
  # Bump to invalidate every cache (mise install dirs, .venv, prek hooks,
  # mypy/ruff caches, ...) used by this workflow.
  CACHE_SEED: "2"
  MISE_VERSION: "v2026.5.6"

jobs:
  prepare-ci:
    name: Prepare CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run-build: ${{ steps.check-build.outputs.should-run-build }}
      platform-matrix: ${{ steps.generate-build-matrix.outputs.platform-matrix }}
      binary-archive-triples: ${{ steps.generate-build-matrix.outputs.binary-archive-triples }}
      pythons-binary: ${{ steps.generate-build-matrix.outputs.pythons-binary }}
      pythons-py: ${{ steps.generate-build-matrix.outputs.pythons-py }}
      # Mirrors env.CACHE_SEED / env.MISE_VERSION. Exposed as outputs so
      # reusable workflows can read them via `needs.prepare-ci.outputs.*`
      # (the `env` context is not allowed in workflow-call `with:` blocks).
      cache-seed: ${{ steps.cache-seed.outputs.cache-seed }}
      mise-version: ${{ steps.mise-version.outputs.mise-version }}
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Expose cache seed
        id: cache-seed
        run: echo "cache-seed=${{ env.CACHE_SEED }}" >> "$GITHUB_OUTPUT"

      - name: Expose mise version
        id: mise-version
        run: echo "mise-version=${{ env.MISE_VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          cache_key_prefix: ${{ env.CACHE_SEED }}|mise|${{ env.MISE_VERSION }}|prepare-ci|${{ runner.os }}|${{ runner.arch }}

      - name: Generate additional ToolR requirements file
        run: |
          uv export --frozen --no-hashes --only-group tools --output-file ${{ github.workspace }}/toolr-requirements.txt

      - name: Setup ToolR
        id: setup-toolr
        uses: s0undt3ch/ToolR@8cd163aa75e825c20207500024cad82f14ff6a87 # v0.11.1
        with:
          requirements-file: ${{ github.workspace }}/toolr-requirements.txt

      - name: Check if the build should run
        id: check-build
        run: |
          toolr ci check-run-build ${{ github.event_name }} ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Build Matrix
        id: generate-build-matrix
        if: fromJSON(steps.check-build.outputs.should-run-build)
        run: |
          toolr ci generate-build-matrix --workflow ci

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - prepare-ci
    if: fromJSON(needs.prepare-ci.outputs.should-run-build)
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Prek
        id: setup-pre-commit
        uses: ./.github/actions/setup-pre-commit
        with:
          cache-seed: ${{ env.CACHE_SEED }}|ci
          mise-version: ${{ env.MISE_VERSION }}

      - name: Run Prek
        run: |
          prek run --all-files --show-diff-on-failure

  prepare-release:
    name: Prepare Release
    needs:
      - prepare-ci
      - pre-commit
    uses: ./.github/workflows/_prepare-release.yml
    with:
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-archive:
    name: Build binary archives (per triple)
    # `prepare-ci.outputs.binary-archive-triples` (in ci mode) lists the
    # runner-native triples — x86_64-unknown-linux-gnu, aarch64-apple-darwin,
    # x86_64-pc-windows-msvc — so downstream tests + the docs job can
    # download the standalone `toolr` binary as an artifact instead of
    # paying for a per-job `cargo build --release`. release.yml builds
    # the same workflow with the full 7-triple matrix.
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build-binary-archive.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      release-version: ${{ needs.prepare-release.outputs.release-version }}
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      targets: ${{ needs.prepare-ci.outputs.binary-archive-triples }}

  # test-* now CONSUMES the prebuilt artifacts (toolr binary archive + the
  # matching toolr-py wheel for each matrix python) instead of compiling
  # them itself. The DAG is intentionally `prepare-ci → wheels/archive →
  # test-*`; signal lands later than before, but every test exercises the
  # exact artifact that ships, and there's no per-matrix maturin rebuild.
  test-linux:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-linux
      - build-binary-archive
    uses: ./.github/workflows/_test.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-windows:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-windows
      - build-binary-archive
    uses: ./.github/workflows/_test.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-macos:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-macos
      - build-binary-archive
    uses: ./.github/workflows/_test.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  build-binary-wheel-linux:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-linux:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-wheel-windows:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-windows:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-wheel-macos:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-macos:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  test-distribution-linux:
    name: Test
    needs:
      - prepare-ci
      - build-py-wheel-linux
      - build-binary-wheel-linux
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*linux*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-macos:
    name: Test
    needs:
      - prepare-ci
      - build-py-wheel-macos
      - build-binary-wheel-macos
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*macosx*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-windows:
    name: Test
    needs:
      - prepare-ci
      - build-py-wheel-windows
      - build-binary-wheel-windows
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*win*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  docs:
    name: Publish Docs
    runs-on: ubuntu-latest

    needs:
      - pre-commit
      - prepare-release
      # Snippet regeneration shells out to the toolr binary. Depending on
      # build-binary-archive lets us use the same Rust binary CI builds
      # for testing — no per-job `cargo build --release`.
      - build-binary-archive

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: docs
          cache-seed: ${{ env.CACHE_SEED }}
          # Empty string keeps the version pinned in mise.toml.
          python-version: ""
          uv-sync-args: "--group docs"
          mise-version: ${{ env.MISE_VERSION }}

      - uses: ./.github/actions/configure-git
      - name: Apply Release Patch
        uses: ./.github/actions/apply-release-patch
        with:
          release-patch-name: ${{ needs.prepare-release.outputs.release-patch-name }}

      - name: Download toolr binary archive (linux-gnu)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolr-archive-x86_64-unknown-linux-gnu
          path: ${{ runner.temp }}/toolr-archive

      - name: Extract toolr binary
        id: toolr-binary
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/toolr-bin"
          mkdir -p "$dest"
          archive=$(find "$RUNNER_TEMP/toolr-archive" -maxdepth 1 -type f -name 'toolr-*.tar.gz' -print -quit)
          if [ -z "$archive" ]; then
            echo "no toolr-*.tar.gz archive found under $RUNNER_TEMP/toolr-archive/" >&2
            find "$RUNNER_TEMP/toolr-archive" -maxdepth 2 -mindepth 1 -print >&2 || true
            exit 1
          fi
          tar -xzf "$archive" -C "$dest" --strip-components=1
          chmod +x "$dest/toolr"
          echo "path=$dest/toolr" >> "$GITHUB_OUTPUT"

      - name: Verify doc snippets are in sync
        env:
          TOOLR_REGEN_BINARY: ${{ steps.toolr-binary.outputs.path }}
        run: |
          set +e
          .pre-commit-hooks/regen-doc-snippets.py --check 2> "$RUNNER_TEMP/snippet-diff"
          status=$?
          set -e
          # Always echo the captured diff to the job log for searchability.
          cat "$RUNNER_TEMP/snippet-diff" >&2 || true
          if [ "$status" -ne 0 ]; then
            {
              echo "## ❌ Doc snippets are stale"
              echo
              echo "The captured \`--help\` snippets under \`docs/\` no longer match the current \`toolr\` binary. The pre-commit hook is advisory (skipped when no \`toolr\` is on PATH locally), so CI is the authoritative check."
              echo
              echo "**Fix locally:**"
              echo
              echo '```bash'
              echo '.pre-commit-hooks/regen-doc-snippets.py'
              echo 'git add docs/'
              echo 'git commit -m "docs: regen snippets"'
              echo '```'
              echo
              echo "<details><summary>Diff</summary>"
              echo
              echo '```diff'
              cat "$RUNNER_TEMP/snippet-diff"
              echo '```'
              echo
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  publish:
    name: Publish to Test PyPI
    needs:
      - build-binary-wheel-linux
      - build-py-wheel-linux
      - build-binary-wheel-windows
      - build-py-wheel-windows
      - build-binary-wheel-macos
      - build-py-wheel-macos
      - test-distribution-linux
      - test-distribution-windows
      - test-distribution-macos
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      - name: Flatten dist/ directory
        run: |
          ls -lah dist/

      - name: Publish to Test PyPI (Trusted Publisher)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  set-pipeline-exit-status:
    permissions:
      actions: read
    # This step is just so we can make github require this step, to pass checks
    # on a pull request instead of requiring all
    name: Set the ${{ github.workflow }} Pipeline Exit Status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare-ci
      - pre-commit
      - prepare-release
      # test-* used to be transitive (publish ← wheels ← test-*); now that
      # tests are downstream consumers of the wheels, list them explicitly
      # so a failed test still flips the pipeline status to failure.
      - test-linux
      - test-macos
      - test-windows
      - docs
      - publish
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: martialonline/workflow-status@326830cacf79872efe767e15031f58d1ea0508c4 # v4.2
        id: check
      - run: echo "Workflow failed"
        if: steps.check.outputs.status == 'failure'
      - run: echo "Workflow was cancelled"
        if: steps.check.outputs.status == 'cancelled'
      - run: echo "Workflow was successful"
        if: steps.check.outputs.status == 'success'
