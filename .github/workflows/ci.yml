name: CI Workflow
run-name: "CI (${{ github.event_name == 'pull_request' && format('pr: #{0}', github.event.number) || format('{0}: {1}', startsWith(github.event.ref, 'refs/tags') && 'tag' || 'branch', github.ref_name) }})"

on:
  push:
  pull_request:
    # Default PR triggers PLUS labeled/unlabeled: applying or removing the
    # `full-build` or `full-bench` label re-runs CI so the new matrix /
    # bench shape takes effect without needing a dummy commit. Other label
    # changes also trigger a re-run (cheap and self-correcting);
    # `tools/ci.py` ignores labels other than `full-build`/`full-bench`.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  # Concurrency is defined in a way that concurrent builds against the main branch do not not cancel previous builds.
  # However, for branches other than the main branch, and every new build against the same pull request source branch,
  # all older builds against that same branch get canceled.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.repository }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ !contains(github.ref, 'refs/heads/main') }}

permissions: {}

env:
  COLUMNS: 190
  FORCE_COLOR: "1"
  # Bump to invalidate every cache (mise install dirs, .venv, prek hooks,
  # mypy/ruff caches, ...) used by this workflow.
  CACHE_SEED: "3"
  # `MISE_VERSION` lives in `.github/env` — loaded per-job by a
  # "Load shared env vars" step (immediately after `actions/checkout`)
  # so the value is available via `$MISE_VERSION` / `env.MISE_VERSION`
  # to every subsequent step. Bump that file to upgrade mise across
  # every workflow in a single edit.

jobs:
  prepare-ci:
    name: Prepare CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run-build: ${{ steps.check-build.outputs.should-run-build }}
      platform-matrix: ${{ steps.generate-build-matrix.outputs.platform-matrix }}
      binary-archive-triples: ${{ steps.generate-build-matrix.outputs.binary-archive-triples }}
      pythons-binary: ${{ steps.generate-build-matrix.outputs.pythons-binary }}
      pythons-py: ${{ steps.generate-build-matrix.outputs.pythons-py }}
      test-pythons: ${{ steps.generate-build-matrix.outputs.test-pythons }}
      run-full-bench: ${{ steps.generate-build-matrix.outputs.run-full-bench }}
      # Mirrors env.CACHE_SEED / env.MISE_VERSION. Exposed as outputs so
      # reusable workflows can read them via `needs.prepare-ci.outputs.*`
      # (the `env` context is not allowed in workflow-call `with:` blocks).
      cache-seed: ${{ steps.cache-seed.outputs.cache-seed }}
      mise-version: ${{ steps.mise-version.outputs.mise-version }}
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load shared env vars
        # `$GITHUB_ENV` expects strict `KEY=VALUE` lines and rejects
        # blank/comment lines as "Invalid format". Filter `.github/env`
        # to the assignment lines (sed `p`-prints lines starting with
        # an uppercase letter) so comments in the source file are
        # preserved for human readers but skipped by the loader.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Expose cache seed
        id: cache-seed
        run: echo "cache-seed=${{ env.CACHE_SEED }}" >> "$GITHUB_OUTPUT"

      - name: Expose mise version
        id: mise-version
        run: echo "mise-version=$MISE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          cache_key_prefix: ${{ env.CACHE_SEED }}|mise|${{ env.MISE_VERSION }}|prepare-ci|${{ runner.os }}|${{ runner.arch }}

      - name: Setup ToolR
        # In-repo composite action: downloads the toolr binary from a
        # GitHub release, verifies the SLSA build provenance, and
        # caches both the binary and the in-tree `tools/.venv` keyed
        # on `tools/{pyproject.toml,uv.lock}` so subsequent runs skip
        # the `uv sync` toolr would otherwise run on first invocation.
        id: setup-toolr
        uses: ./
        with:
          version: latest
          cache-prefix: ${{ env.CACHE_SEED }}|setup-toolr|prepare-ci

      - name: Check if the build should run
        id: check-build
        env:
          # Route through `env:` so `github.ref_name` (which is
          # attacker-controllable — branch names can contain shell
          # metacharacters) doesn't get spliced into the shell line
          # at interpolation time. The `toolr` CLI receives them as
          # ordinary argv.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: toolr ci check-run-build "$EVENT_NAME" "$REF_NAME"

      - name: Generate Build Matrix
        id: generate-build-matrix
        if: fromJSON(steps.check-build.outputs.should-run-build)
        # `--workflow` is intentionally omitted: `generate-build-matrix`
        # auto-detects from the GitHub event context (push to main →
        # release; PR with `full-build` label → release; otherwise ci)
        # and writes a one-line _reason_ to the job step summary so
        # reviewers can see at a glance why this run got the matrix it
        # got. The decision logic lives in `tools/ci.py` next to the
        # matrix data, not split across the workflow YAML.
        run: |
          toolr ci generate-build-matrix

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - prepare-ci
    if: fromJSON(needs.prepare-ci.outputs.should-run-build)
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load shared env vars
        # `$GITHUB_ENV` expects strict `KEY=VALUE` lines and rejects
        # blank/comment lines as "Invalid format". Filter `.github/env`
        # to the assignment lines (sed `p`-prints lines starting with
        # an uppercase letter) so comments in the source file are
        # preserved for human readers but skipped by the loader.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Setup Prek
        id: setup-pre-commit
        uses: ./.github/actions/setup-pre-commit
        with:
          cache-seed: ${{ env.CACHE_SEED }}|ci
          mise-version: ${{ env.MISE_VERSION }}

      - name: Run Prek
        run: |
          prek run --all-files --show-diff-on-failure

  prepare-release:
    name: Prepare Release
    needs:
      - prepare-ci
      - pre-commit
    uses: ./.github/workflows/_prepare-release.yml
    with:
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-archive:
    name: Build (binary)
    # `prepare-ci.outputs.binary-archive-triples` (in ci mode) lists the
    # runner-native triples — x86_64-unknown-linux-gnu, aarch64-apple-darwin,
    # x86_64-pc-windows-msvc — so downstream tests + the docs job can
    # download the standalone `toolr` binary as an artifact instead of
    # paying for a per-job `cargo build --release`. release.yml builds
    # the same workflow with the full 7-triple matrix.
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build-binary-archive.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      release-version: ${{ needs.prepare-release.outputs.release-version }}
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      targets: ${{ needs.prepare-ci.outputs.binary-archive-triples }}

  # The example plugin is pure Python — one universal wheel covers
  # every Test matrix entry on every OS. Build it once here and let the
  # Test jobs download it via the `example-plugin-wheel` artifact (and
  # the contract test's session-scoped fixture falls back to inline
  # `uv build` if the artifact is absent, so this job is a CI-time
  # optimisation, not a correctness gate).
  build-example-plugin-wheel:
    name: Build (example plugin)
    needs:
      - prepare-ci
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: build-example-plugin-wheel
          cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
          uv-sync-args: "--no-install-workspace"
          mise-version: ${{ needs.prepare-ci.outputs.mise-version }}

      - name: Build the example-plugin wheel
        shell: bash
        run: |
          set -euo pipefail
          uv build --wheel --out-dir wheelhouse examples/plugin-package

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: example-plugin-wheel
          path: wheelhouse/toolr_plugin_example-*.whl

  build-binary-wheel-linux:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-linux:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-wheel-windows:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-windows:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-binary-wheel-macos:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  build-py-wheel-macos:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}
    permissions:
      contents: read
      id-token: write
      attestations: write

  # test-* now CONSUMES the prebuilt artifacts (toolr binary archive + the
  # matching toolr-py wheel for each matrix python) instead of compiling
  # them itself. The DAG is intentionally `prepare-ci → wheels/archive →
  # test-*`; signal lands later than before, but every test exercises the
  # exact artifact that ships, and there's no per-matrix maturin rebuild.
  test-linux:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-linux
      - build-binary-archive
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      pythons: ${{ needs.prepare-ci.outputs.test-pythons }}
    permissions:
      contents: read
      id-token: write

  test-windows:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-windows
      - build-binary-archive
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      pythons: ${{ needs.prepare-ci.outputs.test-pythons }}
    permissions:
      contents: read
      id-token: write

  test-macos:
    name: Test
    needs:
      - prepare-ci
      - pre-commit
      - build-py-wheel-macos
      - build-binary-archive
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      pythons: ${{ needs.prepare-ci.outputs.test-pythons }}
    permissions:
      contents: read
      id-token: write

  test-distribution-linux:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-py-wheel-linux
      - build-binary-wheel-linux
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*linux*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-macos:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-py-wheel-macos
      - build-binary-wheel-macos
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*macosx*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-windows:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-py-wheel-windows
      - build-binary-wheel-windows
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*win*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  docs:
    name: Publish Docs
    runs-on: ubuntu-latest

    needs:
      - pre-commit
      - prepare-release
      # Snippet regeneration shells out to the toolr binary. Depending on
      # build-binary-archive lets us use the same Rust binary CI builds
      # for testing — no per-job `cargo build --release`.
      - build-binary-archive
      # `regen-doc-snippets.py` runs `toolr project manifest rebuild`
      # inside a fixture, which dispatches to Python and needs
      # `import toolr` to succeed. We install the prebuilt toolr-py
      # wheel into the venv (matching mise.toml's pinned CPython) so
      # `uv sync --no-install-workspace` doesn't have to rebuild
      # toolr-py from source.
      - build-py-wheel-linux

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load shared env vars
        # `$GITHUB_ENV` expects strict `KEY=VALUE` lines and rejects
        # blank/comment lines as "Invalid format". Filter `.github/env`
        # to the assignment lines (sed `p`-prints lines starting with
        # an uppercase letter) so comments in the source file are
        # preserved for human readers but skipped by the loader.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: docs
          cache-seed: ${{ env.CACHE_SEED }}
          # Skip workspace install (no maturin rebuild of toolr/toolr-py).
          # toolr-py gets pip-installed below from the prebuilt cp314 wheel.
          uv-sync-args: "--group docs --no-install-workspace"
          mise-version: ${{ env.MISE_VERSION }}

      - uses: ./.github/actions/configure-git
      - name: Apply Release Patch
        uses: ./.github/actions/apply-release-patch
        with:
          release-patch-name: ${{ needs.prepare-release.outputs.release-patch-name }}

      - name: Compute docs Python cp-tag
        id: cp-tag
        shell: bash
        # abi3: the toolr-py wheel is a single cp311-abi3 build that
        # installs on every CPython >=3.11, so the artifact is always
        # tagged cp311 — independent of the venv's active Python.
        run: |
          echo "cp-tag=cp311" >> "$GITHUB_OUTPUT"

      - name: Download toolr-py wheel
        # `regen-doc-snippets.py` runs `toolr project manifest rebuild`,
        # which dispatches to a Python that must `import toolr`. The dev
        # venv (.venv) gets toolr-py via this pip install — no per-job
        # maturin rebuild. The cp-tag tracks mise.toml's pinned Python.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cibw-wheel-py-${{ steps.cp-tag.outputs.cp-tag }}-manylinux_x86_64
          path: ${{ runner.temp }}/toolr-py-wheel

      - name: Install toolr-py from prebuilt wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel=$(find "$RUNNER_TEMP/toolr-py-wheel" -maxdepth 1 -type f -name 'toolr_py-*.whl' -print -quit)
          if [ -z "$wheel" ]; then
            echo "no toolr_py wheel found under $RUNNER_TEMP/toolr-py-wheel/" >&2
            find "$RUNNER_TEMP/toolr-py-wheel" -maxdepth 2 -mindepth 1 -print >&2 || true
            exit 1
          fi
          uv pip install --force-reinstall "$wheel"

      - name: Download toolr binary archive (linux-gnu)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolr-archive-x86_64-unknown-linux-gnu
          path: ${{ runner.temp }}/toolr-archive

      - name: Extract toolr binary
        id: toolr-binary
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/toolr-bin"
          mkdir -p "$dest"
          archive=$(find "$RUNNER_TEMP/toolr-archive" -maxdepth 1 -type f -name 'toolr-*.tar.gz' -print -quit)
          if [ -z "$archive" ]; then
            echo "no toolr-*.tar.gz archive found under $RUNNER_TEMP/toolr-archive/" >&2
            find "$RUNNER_TEMP/toolr-archive" -maxdepth 2 -mindepth 1 -print >&2 || true
            exit 1
          fi
          tar -xzf "$archive" -C "$dest" --strip-components=1
          chmod +x "$dest/toolr"
          echo "path=$dest/toolr" >> "$GITHUB_OUTPUT"

      # Inline rather than via `toolr ci check-doc-snippets`. That
      # command requires `tools/.toolr-manifest.json` to exist (it's
      # gitignored) AND for the toolr dispatcher's resolved tools-venv
      # to contain toolr-py. The docs job ships toolr-py in `<repo>/.venv`
      # but toolr resolves a *different* venv (per `tools/pyproject.toml`'s
      # `venv-location`, default cache), so the bootstrap would need an
      # extra `toolr project manifest rebuild` + venv resolution dance.
      # The bash version only needs the regen script + the extracted
      # toolr binary, both already present. The `tools/ci.py`'s
      # `check_doc_snippets` function stays as the canonical surface for
      # any job that does have a fully bootstrapped toolr (e.g.
      # `prepare-ci` via the `s0undt3ch/ToolR` action).
      - name: Verify doc snippets are in sync
        env:
          TOOLR_REGEN_BINARY: ${{ steps.toolr-binary.outputs.path }}
        run: |
          set +e
          .pre-commit-hooks/regen-doc-snippets.py --check 2> "$RUNNER_TEMP/snippet-diff"
          status=$?
          set -e
          cat "$RUNNER_TEMP/snippet-diff" >&2 || true
          if [ "$status" -ne 0 ]; then
            {
              echo "## ❌ Doc snippets are stale"
              echo
              echo "The captured \`--help\` snippets under \`docs/\` no longer match the current \`toolr\` binary. The pre-commit hook is advisory (skipped when no \`toolr\` is on PATH locally), so CI is the authoritative check."
              echo
              echo "**Fix locally:**"
              echo
              echo '```bash'
              echo 'cargo build --release -p toolr   # ensure target/release/toolr is current'
              echo '.pre-commit-hooks/regen-doc-snippets.py'
              echo 'git add docs/'
              echo 'git commit -m "docs: regen snippets"'
              echo '```'
              echo
              echo "<details><summary>Diff</summary>"
              echo
              echo '```diff'
              cat "$RUNNER_TEMP/snippet-diff"
              echo '```'
              echo
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  publish:
    name: Publish to Test PyPI
    needs:
      - build-binary-wheel-linux
      - build-py-wheel-linux
      - build-binary-wheel-windows
      - build-py-wheel-windows
      - build-binary-wheel-macos
      - build-py-wheel-macos
      - test-distribution-linux
      - test-distribution-windows
      - test-distribution-macos
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      - name: Flatten dist/ directory
        run: |
          ls -lah dist/

      - name: Publish to Test PyPI (Trusted Publisher)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  # Bench-* jobs run `toolr bench compare --markdown --install` against
  # this PR's built `toolr` + `toolr-py` artifacts and post the result
  # to each runner's step summary.
  bench-linux:
    name: Bench
    needs:
      - prepare-ci
      - build-binary-archive
      - build-py-wheel-linux
    uses: ./.github/workflows/_bench.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read

  bench-macos:
    name: Bench
    # macOS/Windows benches are advisory step-summary output nothing
    # blocks on, and macOS runner-minutes cost ~10x Linux. Gated on
    # `run-full-bench` (computed in tools/ci.py): true on push to `main`
    # or a PR carrying the `full-bench` label. The Linux bench (below)
    # always runs.
    if: needs.prepare-ci.outputs.run-full-bench == 'true'
    needs:
      - prepare-ci
      - build-binary-archive
      - build-py-wheel-macos
    uses: ./.github/workflows/_bench.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read

  bench-windows:
    name: Bench
    # Gated identically to bench-macos on `run-full-bench` (push to
    # `main` or the `full-bench` PR label). See bench-macos for rationale.
    if: needs.prepare-ci.outputs.run-full-bench == 'true'
    needs:
      - prepare-ci
      - build-binary-archive
      - build-py-wheel-windows
    uses: ./.github/workflows/_bench.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read

  set-pipeline-exit-status:
    permissions:
      actions: read
    # This step is just so we can make github require this step, to pass checks
    # on a pull request instead of requiring all
    name: Set the ${{ github.workflow }}(${{ github.event_name }}) Pipeline Exit Status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare-ci
      - pre-commit
      - prepare-release
      - test-linux
      - test-macos
      - test-windows
      - bench-linux
      - bench-macos
      - bench-windows
      - docs
      - publish
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: martialonline/workflow-status@326830cacf79872efe767e15031f58d1ea0508c4 # v4.2
        id: check
      - run: echo "Workflow failed"
        if: steps.check.outputs.status == 'failure'
      - run: echo "Workflow was cancelled"
        if: steps.check.outputs.status == 'cancelled'
      - run: echo "Workflow was successful"
        if: steps.check.outputs.status == 'success'
