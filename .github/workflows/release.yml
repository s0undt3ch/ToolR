name: Release
run-name: "Release (branch: ${{ github.ref_name }}; version: ${{ inputs.release-version }})"

on:
  workflow_dispatch:
    inputs:
      release-version:
        required: false
        type: string
        description: 'Release version to prepare'

env:
  COLUMNS: 190
  FORCE_COLOR: "1"
  # Bump to invalidate every cache used by this workflow.
  CACHE_SEED: "1"
  # `MISE_VERSION` lives in `.github/env` (loaded per-job by a
  # "Load shared env vars" step) so a single edit propagates to every
  # workflow.

permissions: {}


concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.repository }}
  cancel-in-progress: false

jobs:

  prepare-ci:
    name: Prepare CI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    outputs:
      platform-matrix: ${{ steps.generate-build-matrix.outputs.platform-matrix }}
      binary-archive-triples: ${{ steps.generate-build-matrix.outputs.binary-archive-triples }}
      pythons-binary: ${{ steps.generate-build-matrix.outputs.pythons-binary }}
      pythons-py: ${{ steps.generate-build-matrix.outputs.pythons-py }}
      # Mirrors env.CACHE_SEED / env.MISE_VERSION. Reusable workflows can't
      # read `env` from a caller's `with:` block, so they read these
      # outputs instead.
      cache-seed: ${{ steps.cache-seed.outputs.cache-seed }}
      mise-version: ${{ steps.mise-version.outputs.mise-version }}
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check For Admin Permission
        uses: actions-cool/check-user-permission@c21884f3dda18dafc2f8b402fe807ccc9ec1aa5e # v2.4.0
        with:
          require: admin
          username: ${{ github.triggering_actor }}

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Load shared env vars
        # See ci.yml's matching step for why we sed-filter instead of cat.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Expose cache seed
        id: cache-seed
        run: echo "cache-seed=${{ env.CACHE_SEED }}" >> "$GITHUB_OUTPUT"

      - name: Expose mise version
        id: mise-version
        run: echo "mise-version=$MISE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: ${{ env.MISE_VERSION }}
          cache: true
          cache_key_prefix: ${{ env.CACHE_SEED }}|mise|${{ env.MISE_VERSION }}|prepare-release|${{ runner.os }}|${{ runner.arch }}

      - name: Setup ToolR
        # In-repo composite action: downloads the toolr binary from a
        # GitHub release, verifies the SLSA build provenance, and
        # caches the in-tree `tools/.venv` so `toolr ci
        # generate-build-matrix` (which imports `packaging` from the
        # tools dependency group) doesn't have to rebuild the venv on
        # every release.
        id: setup-toolr
        uses: ./
        with:
          version: latest
          cache-prefix: ${{ env.CACHE_SEED }}|setup-toolr|prepare-release

      - name: Generate Build Matrix
        id: generate-build-matrix
        run: |
          toolr ci generate-build-matrix --workflow release

  prepare-release:
    name: Prepare Release
    needs:
      - prepare-ci
    uses: ./.github/workflows/_prepare-release.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      release-version: ${{ inputs.release-version }}
      github-app-id: ${{ vars.GH_APP_ID }}
      environment: release
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    secrets:
      github-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

  build-binary-archive:
    name: Build (binary)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build-binary-archive.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      release-version: ${{ needs.prepare-release.outputs.release-version }}
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      targets: ${{ needs.prepare-ci.outputs.binary-archive-triples }}

  build-binary-wheel-linux:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-linux:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  build-binary-wheel-windows:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-windows:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  build-binary-wheel-macos:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-macos:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  # Universal pure-Python wheel — built once and shared across every
  # distribution-test matrix entry via the `example-plugin-wheel`
  # artifact. Mirrors the `build-example-plugin-wheel` job in
  # `ci.yml`. The `example_plugin_wheel` fixture has an inline-build
  # fallback, so this job is a CI-time optimisation, not a correctness
  # gate.
  build-example-plugin-wheel:
    name: Build (example plugin)
    needs:
      - prepare-ci
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: build-example-plugin-wheel
          cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
          uv-sync-args: "--no-install-workspace"
          mise-version: ${{ needs.prepare-ci.outputs.mise-version }}

      - name: Build the example-plugin wheel
        shell: bash
        run: |
          set -euo pipefail
          uv build --wheel --out-dir wheelhouse examples/plugin-package

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: example-plugin-wheel
          path: wheelhouse/toolr_plugin_example-*.whl

  # release.yml's distribution-tests defer to the same reusable
  # workflow ci.yml uses, so the test harness, action SHAs, coverage
  # upload, and junit reporting stay in lockstep across both
  # pipelines. Per-OS jobs (one workflow_call each) instead of a
  # `strategy.matrix` since `workflow_call` doesn't compose with
  # `strategy.matrix` on the caller side.
  test-distribution-linux:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-binary-wheel-linux
      - build-py-wheel-linux
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*linux*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-macos:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-binary-wheel-macos
      - build-py-wheel-macos
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*macosx*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-windows:
    name: Test Distribution
    needs:
      - prepare-ci
      - build-binary-wheel-windows
      - build-py-wheel-windows
      - build-example-plugin-wheel
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*win*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  publish-release:
    name: Publish Release
    environment: release
    needs:
      - build-binary-wheel-linux
      - build-py-wheel-linux
      - build-binary-wheel-windows
      - build-py-wheel-windows
      - build-binary-wheel-macos
      - build-py-wheel-macos
      - build-binary-archive
      - test-distribution-linux
      - test-distribution-macos
      - test-distribution-windows
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      # We could stick this in a custom, in-repo action, but this would mean we would have to checkout
      # the now, and then checkout again with higher privileges, which is why we're doing it here.
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        shell: bash
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Apply Release Patch
        uses: ./.github/actions/apply-release-patch
        with:
          release-patch-name: ${{ needs.prepare-release.outputs.release-patch-name }}

      - name: Tag the v${{ needs.prepare-release.outputs.release-version }} Release
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release-version }}
        run: |
          git tag -m "chore(release): Release v${RELEASE_VERSION}" -a "v${RELEASE_VERSION}"

      - name: Push tag
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release-version }}
        run: |
          git push origin "v${RELEASE_VERSION}"
          git push

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
          path: dist/

      # Per-triple binary archives (consumed by install.sh and the mise
      # plugin). Downloaded to a separate path so they are NOT uploaded to
      # PyPI — they are not Python distributions. They are still attached
      # to the GitHub Release alongside the wheels and sdists.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: toolr-archive-*
          path: release-assets
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare-release.outputs.release-notes-filename }}

      - name: Attest final release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Use the GitHub App token so that the resulting
          # `release: published` event triggers downstream workflows
          # (e.g. sync-rolling-tags.yml). Releases created with the
          # default GITHUB_TOKEN do not fire downstream workflow events.
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ needs.prepare-release.outputs.release-version }}
          name: ${{ needs.prepare-release.outputs.release-version }}
          body_path: ${{ needs.prepare-release.outputs.release-notes-filename }}
          files: |
            dist/*
            release-assets/*
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/
          verbose: true

  set-pipeline-exit-status:
    environment: release
    permissions: {}
    # This job gives the workflow a single check representing the whole run.
    # It must list EVERY job in `needs`: a job skipped because an upstream
    # dependency failed reports `skipped`, not `failure`, so a failure is
    # only visible here on the job that directly failed.
    name: Set the ${{ github.workflow }} Pipeline Exit Status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build-binary-archive
      - build-binary-wheel-linux
      - build-binary-wheel-macos
      - build-binary-wheel-windows
      - build-example-plugin-wheel
      - build-py-wheel-linux
      - build-py-wheel-macos
      - build-py-wheel-windows
      - prepare-ci
      - prepare-release
      - publish-release
      - test-distribution-linux
      - test-distribution-macos
      - test-distribution-windows
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # A local `uses:` resolves from the checked-out tree, and gate jobs
      # otherwise never check out the repo.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Gate on the needed jobs' results
        uses: ./.github/actions/pipeline-gate
        with:
          jobs: ${{ toJSON(needs) }}
