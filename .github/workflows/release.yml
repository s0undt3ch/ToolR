
name: Release
run-name: "Release (branch: ${{ github.ref_name }}; version: ${{ inputs.release-version }})"

on:
  workflow_dispatch:
    inputs:
      release-version:
        required: false
        type: string
        description: 'Release version to prepare'

env:
  COLUMNS: 190
  FORCE_COLOR: "1"
  TOOLR_DEBUG_IMPORTS: "1"
  # Bump to invalidate every cache used by this workflow.
  CACHE_SEED: "1"
  # `MISE_VERSION` lives in `.github/env` (loaded per-job by a
  # "Load shared env vars" step) so a single edit propagates to every
  # workflow.

permissions: {}


concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.repository }}
  cancel-in-progress: false

jobs:

  prepare-ci:
    name: Prepare CI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    outputs:
      platform-matrix: ${{ steps.generate-build-matrix.outputs.platform-matrix }}
      binary-archive-triples: ${{ steps.generate-build-matrix.outputs.binary-archive-triples }}
      pythons-binary: ${{ steps.generate-build-matrix.outputs.pythons-binary }}
      pythons-py: ${{ steps.generate-build-matrix.outputs.pythons-py }}
      # Mirrors env.CACHE_SEED / env.MISE_VERSION. Reusable workflows can't
      # read `env` from a caller's `with:` block, so they read these
      # outputs instead.
      cache-seed: ${{ steps.cache-seed.outputs.cache-seed }}
      mise-version: ${{ steps.mise-version.outputs.mise-version }}
    steps:

      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Check For Admin Permission
        uses: actions-cool/check-user-permission@c21884f3dda18dafc2f8b402fe807ccc9ec1aa5e # v2.4.0
        with:
          require: admin
          username: ${{ github.triggering_actor }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Load shared env vars
        # See ci.yml's matching step for why we sed-filter instead of cat.
        run: sed -n '/^[A-Z]/p' .github/env >> "$GITHUB_ENV"

      - name: Expose cache seed
        id: cache-seed
        run: echo "cache-seed=${{ env.CACHE_SEED }}" >> "$GITHUB_OUTPUT"

      - name: Expose mise version
        id: mise-version
        run: echo "mise-version=$MISE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Virtual Environment
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: prepare-release
          cache-seed: ${{ env.CACHE_SEED }}
          python-version: "3.11"
          mise-version: ${{ env.MISE_VERSION }}

      - name: Generate Build Matrix
        id: generate-build-matrix
        run: |
          uv run toolr ci generate-build-matrix --workflow release

  prepare-release:
    name: Prepare Release
    needs:
      - prepare-ci
    uses: ./.github/workflows/_prepare-release.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      release-version: ${{ inputs.release-version }}
      github-app-id: ${{ vars.GH_APP_ID }}
      environment: release
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    secrets:
      github-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

  build-binary-wheel-linux:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-linux:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Linux
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['linux']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  build-binary-wheel-windows:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-windows:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: Windows
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['windows']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  build-binary-wheel-macos:
    name: Build (binary wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: binary
      pythons: ${{ needs.prepare-ci.outputs.pythons-binary }}

  build-py-wheel-macos:
    name: Build (toolr-py wheel)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      display-name: macOS
      release-tarball-name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
      platform-matrix: ${{ toJSON(fromJSON(needs.prepare-ci.outputs.platform-matrix)['macos']) }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      wheel-kind: py
      pythons: ${{ needs.prepare-ci.outputs.pythons-py }}

  # release.yml's distribution-tests defer to the same reusable
  # workflow ci.yml uses, so the test harness, action SHAs, coverage
  # upload, and junit reporting stay in lockstep across both
  # pipelines. Per-OS jobs (one workflow_call each) instead of a
  # `strategy.matrix` since `workflow_call` doesn't compose with
  # `strategy.matrix` on the caller side.
  test-distribution-linux:
    name: Test
    needs:
      - prepare-ci
      - build-binary-wheel-linux
      - build-py-wheel-linux
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: ubuntu-latest
      display-name: Linux
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*linux*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-macos:
    name: Test
    needs:
      - prepare-ci
      - build-binary-wheel-macos
      - build-py-wheel-macos
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: macos-latest
      display-name: macOS
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*macosx*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  test-distribution-windows:
    name: Test
    needs:
      - prepare-ci
      - build-binary-wheel-windows
      - build-py-wheel-windows
    uses: ./.github/workflows/_test_distribution.yml
    with:
      os: windows-latest
      display-name: Windows
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      artifact-pattern: cibw-wheel-*-*win*
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
    permissions:
      contents: read
      id-token: write

  build-binary-archive:
    name: Build binary archives (per triple)
    needs:
      - prepare-ci
      - prepare-release
    uses: ./.github/workflows/_build-binary-archive.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      release-version: ${{ needs.prepare-release.outputs.release-version }}
      release-tarball-name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
      cache-seed: ${{ needs.prepare-ci.outputs.cache-seed }}
      mise-version: ${{ needs.prepare-ci.outputs.mise-version }}
      targets: ${{ needs.prepare-ci.outputs.binary-archive-triples }}

  publish-release:
    name: Publish Release
    environment: release
    needs:
      - build-binary-wheel-linux
      - build-py-wheel-linux
      - build-binary-wheel-windows
      - build-py-wheel-windows
      - build-binary-wheel-macos
      - build-py-wheel-macos
      - build-binary-archive
      - test-distribution-linux
      - test-distribution-macos
      - test-distribution-windows
      - prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      # We could stick this in a custom, in-repo action, but this would mean we would have to checkout
      # the now, and then checkout again with higher privileges, which is why we're doing it here.
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        shell: bash
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Apply Release Patch
        uses: ./.github/actions/apply-release-patch
        with:
          release-patch-name: ${{ needs.prepare-release.outputs.release-patch-name }}

      - name: Tag the v${{ needs.prepare-release.outputs.release-version }} Release
        run: |
          git tag -m "chore(release): Release v${{ needs.prepare-release.outputs.release-version }}" -a v${{ needs.prepare-release.outputs.release-version }}

      - name: Push tag
        run: |
          git push origin v${{ needs.prepare-release.outputs.release-version }}
          git push

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ needs.prepare-release.outputs.binary-release-tarball-name }}
          path: dist/

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ needs.prepare-release.outputs.py-release-tarball-name }}
          path: dist/

      # Per-triple binary archives (consumed by install.sh and the mise
      # plugin). Downloaded to a separate path so they are NOT uploaded to
      # PyPI — they are not Python distributions. They are still attached
      # to the GitHub Release alongside the wheels and sdists.
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: toolr-archive-*
          path: release-assets
          merge-multiple: true

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ needs.prepare-release.outputs.release-notes-filename }}

      - name: Attest final release artifacts
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.prepare-release.outputs.release-version }}
          name: ${{ needs.prepare-release.outputs.release-version }}
          body_path: ${{ needs.prepare-release.outputs.release-notes-filename }}
          files: |
            dist/*
            release-assets/*
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/
          verbose: true

  set-pipeline-exit-status:
    environment: release
    permissions:
      actions: read
    # This step is just so we can make github require this step, to pass checks
    # on a pull request instead of requiring all
    name: Set the ${{ github.workflow }} Pipeline Exit Status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare-ci
      - prepare-release
      - publish-release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: martialonline/workflow-status@326830cacf79872efe767e15031f58d1ea0508c4 # v4.2
        id: check
      - run: echo "Workflow failed"
        if: steps.check.outputs.status == 'failure'
      - run: echo "Workflow was cancelled"
        if: steps.check.outputs.status == 'cancelled'
      - run: echo "Workflow was successful"
        if: steps.check.outputs.status == 'success'
