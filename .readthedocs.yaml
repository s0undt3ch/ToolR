# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
    # Required: `uv sync --group docs` installs `toolr-py` as editable,
    # which builds via maturin and needs a Rust toolchain visible in
    # PATH. Without this, maturin's puccinialin helper tries to
    # auto-install rustup, collides with the base image's `/usr/bin`
    # Rust, and races to "Text file busy" during `cargo metadata`.
    #
    # Pin >= 1.93: the workspace pulls in ruff's git deps
    # (ruff_python_parser, ruff_python_ast, ...) which require
    # rustc 1.93. `tools.rust: "latest"` maps to asdf's "latest" which
    # currently lags at 1.91.1.
    rust: "1.93"
  jobs:
      pre_create_environment:
         - asdf plugin add uv
         - asdf install uv latest
         - asdf global uv latest
      create_environment:
         - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
      install:
         - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group docs

# Build documentation with Mkdocs
mkdocs:
   configuration: mkdocs.yml
