[tool.pytest.ini_options]
testpaths = ["tests/"]
python_files = "test_*.py"
junit_family = "xunit2"
markers = [
    "distribution: tests that build/install real wheels (slow; opt-in)",
]
addopts = [
  "-ra",
  "-s",
  "--showlocals",
  "--strict-config",
  "--strict-markers",
]

[tool.uv]

[tool.uv.workspace]
members = [
    "crates/toolr",
    "crates/toolr-py",
    "tests/support/3rd-party-pkg",
    "tools",
]

[tool.uv.sources]
toolr = { workspace = true }
toolr-py = { workspace = true }
"3rd-party-pkg" = { workspace = true }

[dependency-groups]
dev = [
    "3rd-party-pkg",
    "toolr-py",
    "attrs>=25.3.0",
    "coverage>=7.14.0",
    "hypothesis>=6.0.0",
    "pytest>=8.3.5",
    "pytest-skip-markers>=1.5.2",
    "pytest-subtests>=0.14.2",
]
docs = [
    "toolr-py",
    "markdown-include>=0.8.1",
    "mkdocs>=1.6.1",
    "mkdocs-awesome-nav>=3.1.2",
    "mkdocs-material>=9.6.16",
    "mkdocstrings[python]>=0.30.0",
    "ruff>=0.15.13",
]
tools = [
    "packaging>=26.2",
]

[tool.ruff]
line-length = 120
show-fixes = true
target-version = "py311"
respect-gitignore = true
src = [
  "crates/toolr-core/src",
  "crates/toolr/src",
  "crates/toolr-py/src",
  "crates/toolr-py/python",
  "tests",
  "tools",
]
extend-exclude = [
  ".nox/**",
  "tests/**/files/*.py",
  "docs/.fixtures/**/*.py",
]
extend-include = [
]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  # D* pydocstyle
  "ANN",     # Don't complain about annotations
  "ARG001",  # Unused function argument
  "COM",     # flake8-commas - Black takes care of this
  "D103",    # Missing docstring in public function
  "D200",    # Reformat to one line
  "D212",    # Remove whitespace after opening quotes
  "ERA",     # eradicate
  "FBT001",  # Boolean-typed positional argument in function definition
  "FBT002",  # Boolean default positional argument in function definition
  "FIX002",  # Line contains TODO, consider resolving the issue"
  "PERF203", # `try`-`except` within a loop incurs performance overhead"
  "PERF401", # Use a list comprehension to create a transformed list
  "PERF402", # Use `list` or `list.copy` to create a copy of a list
  "PLR2004", # Magic value used in comparison, consider replacing `2` with a constant variable"
  "PTH",     # Stop complaining about switching to pathlib
  "RET503",  # Missing explicit `return` at the end of function able to return non-`None` value
  "RUF005",  # Consider iterable unpacking instead of concatenation
  "SIM108",  # Use ternary operator `A = X if Y else Z` instead of `if`-`else`-block
  "SIM110",  # Use `return any( ... etc ...)` instead of `for` loop
  "TC003",   # Move standard library import `pathlib.Path` into a type-checking block
  "TD002",   # Missing author in TODO; try: `# TODO(<author_name>): ...` or `# TODO @<author_name>: ...`"
  "TD003",   # Missing issue link on the line following this TODO
]

[tool.ruff.lint.per-file-ignores]
"crates/toolr-py/python/**/*.py" = [
  "D104",   # Missing docstring in public package
  "D107",   # Missing docstring in `__init__`
  "PT",     # flake8-pytest-style (PT) - Disabled in production code, only enforced in tests
]
"crates/toolr-py/python/toolr/_context.py" = [
  "PYI041", # redundant-numeric-union
]
"crates/toolr-py/python/toolr/utils/_rust_utils.pyi" = [
  "A002",   # Function argument `input` is shadowing a Python builtin
  "N818",   # Exception name `*` should be named with an Error suffix"
]
"tests/**/*.py" = [
  "ANN",      # Ignore missing type annotations in tests
  "ARG001",   # Unused function argument
  "D",        # Don't complain about any docstrings in tests
  "PLR2004",  # Magic value used in comparison, consider replacing <number> with a constant variable
  "PT001",    # use @pytest.fixture() over @pytest.fixture
  "PT023",    # use @pytest.mark.<blah>() over @pytest.mark.<blah>
  "S101",     # Ignore the use of 'assert ...' in tests
  "SIM117",   # Use a single `with` statement with multiple contexts instead of nested `with` statements
  "SLF001",   # Private member accessed
  "TC001",    # Move application import into a type-checking block
  "TCH002",   # Move third-party import into a type-checking block
  "BLE001",   # Do not catch blind exception: `Exception`
]
"tests/cli/**/*.py" = [
  "RUF013",   # PEP 484 prohibits implicit `Optional`
]
"tests/utils/**/*.py" = [
  "PLC0415", # `import` should be at the top-level of a file
]
"tests/support/coverage/*.py" = [
  "INP001",   # File `...` is part of an implicit namespace package. Add an `__init__.py`."
]
"scripts/*.py" = [
  "INP001",   # Standalone scripts, no package needed
]
"docs/**/files/*.py" = [
  "BLE001",   # Do not catch blind exception: `Exception`
  "D100",     # missing docstring in public module
  "D101",     # Missing docstring in public class
  "D417",     # Missing argument description in the docstring for `echo`: `ctx`
  "EM102",    # Exception must not use an f-string literal, assign to variable first"
  "INP001",   # File `xyz` is part of an implicit namespace package. Add an `__init__.py`.
  "TRY003",   # Avoid specifying long messages outside the exception class
]

[tool.ruff.lint.pydocstyle]
# Use Google-style docstrings.
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = false
force-single-line = true
known-first-party = [
  "toolr",
]
forced-separate = [
  "tests"
]
required-imports = [
  "from __future__ import annotations"
]

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"

[tool.ruff.lint.pep8-naming]
ignore-names = [
  "__virtual__",
]

[tool.ruff.lint.mccabe]
max-complexity = 40

[tool.ruff.lint.pylint]
max-branches = 40
max-args = 10

[tool.mypy]
python_version = "3.11"
disable_error_code = "import-untyped"
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_unused_ignores = true
mypy_path = "crates/toolr-py/python"
exclude = [
  "tests/.*/files/.*\\.py",
  "^tests/([^/]*/)*files/.*",
  "tests/support/3rd-party-pkg/.*"
]

[[tool.mypy.overrides]]
module = [
  "tests.*"
]
disallow_untyped_calls = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false

[[tool.mypy.overrides]]
module = [
  "tests.cli.*",
]
disable_error_code = [
  "assignment",
]
