[tools]
# All CPython versions the CI test matrix runs. The first entry is
# the default (used for the project venv); the rest exist so
# `mise.lock` carries pinned entries for them тАФ CI's
# `mise install --locked` fails for any version the lockfile doesn't
# know, and the test matrix selects per-job versions via
# `MISE_PYTHON_VERSION`.
python = ["3.14.6", "3.13.14", "3.12.13", "3.11.15"]
actionlint = "1.7.12"
shellcheck = "0.11.0"
gitleaks = "8.30.1"
ruff = "0.15.17"
typos = "1.47.2"
rumdl = "0.2.17"
gh = "2.94.0"
# Without an explicit profile, mise inherits whatever profile the
# machine's rustup is configured with тАФ CI runners resolve to
# `minimal`, which ships no clippy. Pin the profile and add the
# components the pre-commit hooks (clippy) and contributors
# (rustfmt) need so the toolchain is identical everywhere.
rust = { version = "1.96.1", profile = "minimal", components = "clippy,rustfmt" }
uv = { version = "0.11.28" }
prek = "0.4.4"
"cargo:cargo-edit" = "0.13.11"

[env]
_.python.venv = { path = ".venv", create = true, uv_create_args = ['--seed'] }

[settings]
python.uv_venv_auto = true
# `lockfile = true` makes `mise install` write/refresh `mise.lock`
# with per-platform checksums and pre-resolved URLs. Refresh via
# `mise upgrade && mise lock`; bare `mise lock` already targets the
# seven "common platforms" mise considers default (linux/macos
# x64+arm64, plus linux musl and windows x64) тАФ the exact set CI
# runs on тАФ so no `--platform` argument is needed when re-locking.
# Commit `mise.lock` alongside this file.
#
# CI enforcement is automatic: `jdx/mise-action` detects the
# committed `mise.lock` and appends `--locked` to `mise install`,
# so every CI runner installs straight from the lockfile and fails
# loudly if an entry is missing (no silent fallback to GitHub /
# aqua API resolution).
#
# `locked = true` is *deliberately* not set here. mise's `locked`
# setting is process-wide, not file-scoped тАФ see
# https://github.com/jdx/mise/discussions/8305 тАФ so flipping it in
# this project would force every contributor's personal
# `~/.config/mise/config.toml` tools into our lockfile too.
lockfile = true

# --------------------------------------------------------------------
# `mise run test` is the single entry-point a contributor (or CI)
# calls to run everything. The pre-existing `cargo-test` and
# `pytest-test` tasks (in `.mise-tasks/`) remain available for
# scoping to one language when iterating. The opt-in distribution
# suite is slow (builds real wheels) and is NOT included here тАФ run
# `uv run pytest -m distribution` explicitly when changing packaging.
# --------------------------------------------------------------------

[tasks.test]
description = "Run the full default test suite (cargo workspace + pytest)."
run = [
    # Drift gate for `skills/*/references/*.md`. Cheap (single
    # `cargo xtask` invocation in release mode) and catches the
    # most common skill regression тАФ a public-surface change that
    # forgets to regenerate the docs тАФ before the workspace tests
    # even start.
    "cargo xtask build-skill-refs --check",
    "cargo test --workspace",
    "mise run pytest-test",
]
